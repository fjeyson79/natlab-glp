<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password: NATLAB GLP Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #1a365d;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .welcome {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .welcome strong { color: #1a365d; }
        .affiliation-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        .affiliation-badge.LiU { background: #007bff; color: white; }
        .affiliation-badge.UNAV { background: #dc3545; color: white; }
        .affiliation-badge.EXTERNAL { background: #6c757d; color: white; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #2d5a87;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2d5a87;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #1a365d; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
            display: block;
        }
        .message.success {
            background: #efe;
            color: #060;
            border: 1px solid #cfc;
            display: block;
        }
        .password-hint {
            font-size: 12px;
            color: #666;
            margin-top: -15px;
            margin-bottom: 20px;
        }
        .reset-notice {
            font-size: 13px;
            color: #856404;
        }
        .role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="wsLogo" style="display:none;text-align:center;margin-bottom:24px;"></div>
        <h1 id="pageTitle">Password Reset Required</h1>
        <p class="subtitle" id="pageSubtitle">Your administrator has requested that you set a new password</p>

        <div class="welcome" id="welcomeBox">
            <span class="reset-notice" id="welcomeLine1">Welcome back, <strong id="userName">User</strong></span>
            <span id="affiliationBadge" class="affiliation-badge"></span>
            <span id="roleBadge" class="role-badge" style="display:none;"></span>
            <p class="reset-notice" style="margin-top: 10px;" id="welcomeLine2">Please choose a new secure password to continue.</p>
        </div>

        <form id="resetForm">
            <label for="password">New Password</label>
            <input type="password" id="password" placeholder="Enter a new secure password" required minlength="8">
            <p class="password-hint">Minimum 8 characters</p>

            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" placeholder="Confirm your new password" required>

            <button type="submit" id="submitBtn">Update Password</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        // Check if we have a pending password reset
        async function checkPendingReset() {
            try {
                const response = await fetch('/api/di/pending-reset-info', { credentials: 'include' });
                if (!response.ok) {
                    // No pending reset, redirect to access page
                    window.location.href = 'access.html';
                    return;
                }
                const data = await response.json();
                document.getElementById('userName').textContent = data.name || 'User';

                // Affiliation badge
                const badge = document.getElementById('affiliationBadge');
                if (data.affiliation) {
                    badge.textContent = data.affiliation;
                    badge.classList.add(data.affiliation);
                }

                // Role / position badge
                var position = data.workspace_position || '';
                var roleBadgeEl = document.getElementById('roleBadge');
                if (position) {
                    roleBadgeEl.textContent = position.toUpperCase();
                    roleBadgeEl.style.display = '';
                    roleBadgeEl.style.background = 'rgba(0,0,0,0.06)';
                    roleBadgeEl.style.color = '#555';
                } else if (data.workspace_role && data.workspace_role !== 'researcher') {
                    roleBadgeEl.textContent = data.workspace_role.toUpperCase().replace('_', ' ');
                    roleBadgeEl.style.display = '';
                    roleBadgeEl.style.background = 'rgba(0,0,0,0.06)';
                    roleBadgeEl.style.color = '#555';
                }

                // Theralia-specific branding
                if (data.workspace_slug === 'theralia') {
                    applyTheraliaBranding(data);
                }
            } catch (err) {
                window.location.href = 'access.html';
            }
        }

        function applyTheraliaBranding(data) {
            document.title = 'Set Your Password — Theralia';

            // Logo
            var logoEl = document.getElementById('wsLogo');
            logoEl.innerHTML = '<img src="assets/logos/theralia_logo.png" alt="Theralia" style="max-width:220px;display:block;margin:0 auto 16px;" onerror="this.style.display=\'none\'">'
                + '<hr style="height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);border:none;margin:0 0 20px;">';
            logoEl.style.display = '';

            // Header copy
            document.getElementById('pageTitle').textContent = 'Set Your Password';
            document.getElementById('pageSubtitle').textContent = 'Please create a secure password to continue';

            // Welcome box copy
            document.getElementById('welcomeLine1').innerHTML = 'Welcome back, <strong id="userName">' + (data.name || 'User') + '</strong>';
            document.getElementById('welcomeLine2').textContent = 'Set your password to access your workspace';

            // Role badge: Theralia colors
            var roleBadgeEl = document.getElementById('roleBadge');
            if (roleBadgeEl.style.display !== 'none') {
                roleBadgeEl.style.background = 'rgba(255,255,255,0.1)';
                roleBadgeEl.style.color = '#c8c8cf';
            }

            // Dark theme
            var style = document.createElement('style');
            style.textContent = [
                'body { background: linear-gradient(135deg, #1a1a1f 0%, #2a2a32 50%, #1e1e26 100%) !important; }',
                '.container { background: #111114 !important; box-shadow: 0 16px 56px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06) !important; border-radius: 14px !important; padding: 44px 40px !important; }',
                'h1 { color: #e8e8ef !important; }',
                '.subtitle { color: #78787f !important; }',
                '.welcome { background: rgba(255,255,255,0.04) !important; border: 1px solid rgba(255,255,255,0.08) !important; }',
                '.welcome strong { color: #e8e8ef !important; }',
                '.reset-notice { color: #a0a0a8 !important; }',
                'label { color: #c8c8cf !important; font-size: 14px !important; font-weight: 600 !important; }',
                'input { background: #1a1a20 !important; color: #e8e8ef !important; border: 2px solid #333340 !important; border-radius: 8px !important; font-size: 15px !important; }',
                'input:focus { border-color: #ffffff !important; box-shadow: 0 0 0 3px rgba(255,255,255,0.08) !important; background: #1e1e26 !important; }',
                'button { background: #ffffff !important; color: #111114 !important; border-radius: 8px !important; font-size: 14px !important; font-weight: 600 !important; letter-spacing: 0.3px; }',
                'button:hover { background: #e0e0e8 !important; box-shadow: 0 4px 18px rgba(255,255,255,0.12) !important; }',
                'button:disabled { background: #444450 !important; color: #777 !important; }',
                '.password-hint { color: #55555f !important; }',
                '.message.error { background: #2a1515 !important; color: #ff6b6b !important; border: 1px solid #4a2020 !important; }',
                '.message.success { background: #152a15 !important; color: #6bff6b !important; border: 1px solid #204a20 !important; }',
                '.affiliation-badge { display: none !important; }',
            ].join('\n');
            document.head.appendChild(style);
        }

        checkPendingReset();

        const form = document.getElementById('resetForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                messageDiv.textContent = 'Passwords do not match.';
                messageDiv.className = 'message error';
                return;
            }

            if (password.length < 8) {
                messageDiv.textContent = 'Password must be at least 8 characters.';
                messageDiv.className = 'message error';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating password...';
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('/api/di/complete-password-reset', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (!response.ok) {
                    messageDiv.textContent = data.error || 'Password update failed.';
                    messageDiv.className = 'message error';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Update Password';
                } else {
                    messageDiv.textContent = 'Password updated! Redirecting...';
                    messageDiv.className = 'message success';
                    setTimeout(() => {
                        window.location.href = data.redirect || 'upload.html';
                    }, 1500);
                }
            } catch (err) {
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.className = 'message error';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>
</html>
