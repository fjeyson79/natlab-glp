<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login: NATLAB GLP Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2d5a87 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #1a365d;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .welcome {
            background: #e6f3ff;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 25px;
        }
        .welcome strong { color: #1a365d; }
        .affiliation-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }
        .affiliation-badge.LiU { background: #007bff; color: white; }
        .affiliation-badge.UNAV { background: #dc3545; color: white; }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #2d5a87;
        }
        input[readonly] {
            background: #f5f5f5;
            color: #666;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2d5a87;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #1a365d; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            display: none;
        }
        .message.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
            display: block;
        }
        .message.success {
            background: #efe;
            color: #060;
            border: 1px solid #cfc;
            display: block;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2d5a87;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome Back</h1>
        <p class="subtitle">Enter your password to continue</p>

        <div class="welcome">
            Welcome back, <strong id="userName"></strong>
            <span id="affiliationBadge" class="affiliation-badge"></span>
        </div>

        <form id="loginForm">
            <label for="institution_email">Institution Email</label>
            <input type="email" id="institution_email" readonly>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>

            <button type="submit" id="submitBtn">Login</button>
        </form>

        <div id="message" class="message"></div>
        <a id="backLink" href="access.html" class="back-link">Use a different email</a>
    </div>

    <script>
        // Check if we have email from access page
        const email = sessionStorage.getItem('di_email');
        const name = sessionStorage.getItem('di_name');
        const affiliation = sessionStorage.getItem('di_affiliation');

        // Phase 6.2.1: read workspace slug from query param or sessionStorage
        const _urlWs = new URLSearchParams(window.location.search).get('ws');
        const wsSlug = _urlWs || sessionStorage.getItem('di_workspace_slug') || '';
        if (_urlWs && _urlWs !== sessionStorage.getItem('di_workspace_slug')) {
            sessionStorage.setItem('di_workspace_slug', _urlWs);
        }

        if (!email) {
            // redirect to workspace-specific access page if known
            if (wsSlug === 'skinotek') { window.location.href = 'access-skinotek.html'; }
            else if (wsSlug === 'theralia') { window.location.href = 'access-theralia.html'; }
            else { window.location.href = 'access.html'; }
        }

        document.getElementById('institution_email').value = email;
        document.getElementById('userName').textContent = name;
        const badge = document.getElementById('affiliationBadge');
        badge.textContent = affiliation;
        badge.classList.add(affiliation);

        // Phase 6.2.1: point back-link to workspace-specific access page
        if (wsSlug === 'skinotek') document.getElementById('backLink').href = 'access-skinotek.html';
        else if (wsSlug === 'theralia') document.getElementById('backLink').href = 'access-theralia.html';

        // Theralia theme override — matches access-theralia.html styling
        if (wsSlug === 'theralia') {
            document.title = 'Login: Theralia Portal';
            // Hide NAT-Lab identity elements
            document.querySelector('.welcome').style.display = 'none';
            document.querySelector('h1').textContent = '';
            document.querySelector('.subtitle').textContent = '';
            // Inject Theralia logo + dark theme
            const logoHtml = '<div style="text-align:center;margin-bottom:24px;">'
                + '<img src="assets/logos/theralia_logo.png" alt="Theralia" style="max-width:240px;display:block;margin:0 auto 20px;" onerror="this.style.display=\'none\'">'
                + '<hr style="height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);border:none;margin:0 0 24px;">'
                + '<p style="color:#78787f;font-size:13px;">Enter your password to continue</p>'
                + '</div>';
            document.querySelector('.container').insertAdjacentHTML('afterbegin', logoHtml);
            // Apply dark theme CSS
            const style = document.createElement('style');
            style.textContent = `
                body { background: linear-gradient(135deg, #1a1a1f 0%, #2a2a32 50%, #1e1e26 100%) !important; }
                .container { background: #111114 !important; box-shadow: 0 16px 56px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06) !important; border-radius: 14px !important; padding: 44px 40px !important; }
                label { color: #c8c8cf !important; font-size: 14px !important; font-weight: 600 !important; }
                input { background: #1a1a20 !important; color: #e8e8ef !important; border: 2px solid #333340 !important; border-radius: 8px !important; font-size: 15px !important; }
                input:focus { border-color: #ffffff !important; box-shadow: 0 0 0 3px rgba(255,255,255,0.08) !important; background: #1e1e26 !important; }
                input[readonly] { background: #151518 !important; color: #55555f !important; }
                button { background: #ffffff !important; color: #111114 !important; border-radius: 8px !important; font-size: 14px !important; font-weight: 600 !important; letter-spacing: 0.3px; }
                button:hover { background: #e0e0e8 !important; box-shadow: 0 4px 18px rgba(255,255,255,0.12) !important; }
                button:disabled { background: #444450 !important; color: #777 !important; }
                .message.error { background: #2a1515 !important; color: #ff6b6b !important; border: 1px solid #4a2020 !important; }
                .message.success { background: #152a15 !important; color: #6bff6b !important; border: 1px solid #204a20 !important; }
                .back-link { color: #78787f !important; }
                .back-link:hover { color: #c8c8cf !important; }
            `;
            document.head.appendChild(style);
        }

        // Skinotek theme override — matches access-skinotek.html styling
        if (wsSlug === 'skinotek') {
            document.title = 'Login: SKINOTEK Portal';
            document.querySelector('.welcome').style.display = 'none';
            document.querySelector('h1').textContent = '';
            document.querySelector('.subtitle').textContent = '';
            const logoHtml = '<div style="text-align:center;margin-bottom:24px;">'
                + '<img src="assets/logos/skinotek_logo.png" alt="SKINOTEK" style="max-width:800px;width:100%;display:block;margin:0 auto 20px;" onerror="this.style.display=\'none\'">'
                + '<hr style="height:3px;background:linear-gradient(90deg,transparent,#007C91,transparent);border:none;margin:0 0 24px;border-radius:2px;">'
                + '<p style="color:#666;font-size:13px;">Enter your password to continue</p>'
                + '</div>';
            document.querySelector('.container').insertAdjacentHTML('afterbegin', logoHtml);
            const style2 = document.createElement('style');
            style2.textContent = `
                body { background: linear-gradient(135deg, #005f6b 0%, #007C91 50%, #009ba8 100%) !important; }
                .container { background: #ffffff !important; box-shadow: 0 16px 56px rgba(0,0,0,0.25) !important; border-radius: 14px !important; padding: 44px 40px !important; }
                label { color: #333 !important; font-size: 14px !important; font-weight: 600 !important; }
                input { background: #fafbfc !important; color: #333 !important; border: 2px solid #d4dde4 !important; border-radius: 8px !important; font-size: 15px !important; }
                input:focus { border-color: #007C91 !important; box-shadow: 0 0 0 3px rgba(0,124,145,0.12) !important; background: #fff !important; }
                input[readonly] { background: #f0f3f5 !important; color: #888 !important; }
                button { background: #007C91 !important; color: #fff !important; border-radius: 8px !important; font-size: 14px !important; font-weight: 600 !important; letter-spacing: 0.3px; }
                button:hover { background: #005f6b !important; box-shadow: 0 4px 14px rgba(0,124,145,0.3) !important; }
                button:disabled { background: #b0c4cc !important; color: #fff !important; }
                .message.error { background: #fef0f0 !important; color: #c00 !important; border: 1px solid #fcc !important; }
                .message.success { background: #e6f7f9 !important; color: #007C91 !important; border: 1px solid #a8dde4 !important; }
                .back-link { color: #007C91 !important; }
                .back-link:hover { color: #005f6b !important; }
            `;
            document.head.appendChild(style2);
        }

        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Logging in...';
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                // Phase 6.2.1: forward workspace slug to backend
                const loginHeaders = { 'Content-Type': 'application/json' };
                if (wsSlug) loginHeaders['X-Workspace-Slug'] = wsSlug;
                const loginUrl = wsSlug ? '/api/di/login?ws=' + encodeURIComponent(wsSlug) : '/api/di/login';

                const response = await fetch(loginUrl, {
                    method: 'POST',
                    credentials: 'include',
                    headers: loginHeaders,
                    body: JSON.stringify({
                        institution_email: email,
                        password: password
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    messageDiv.textContent = data.error || 'Login failed.';
                    messageDiv.className = 'message error';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Login';
                } else {
                    // Check if password reset is required
                    if (data.requirePasswordReset) {
                        messageDiv.textContent = 'Password reset required. Redirecting...';
                    } else {
                        messageDiv.textContent = 'Login successful! Redirecting...';
                    }
                    messageDiv.className = 'message success';
                    sessionStorage.removeItem('di_email');
                    sessionStorage.removeItem('di_name');
                    sessionStorage.removeItem('di_affiliation');
                    setTimeout(() => {
                        // Workspace-specific portal: trust backend redirect
                        if (wsSlug && wsSlug !== 'natlab' && data.redirect) {
                            window.location.href = data.redirect;
                        } else {
                            const role = data.role || sessionStorage.getItem('di_role') || 'researcher';
                            if (role === 'supervisor') {
                                window.location.href = 'supervisor-dashboard.html';
                            } else {
                                window.location.href = data.redirect || 'upload.html';
                            }
                        }
                    }, 1000);
                }
            } catch (err) {
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.className = 'message error';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
