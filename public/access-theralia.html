<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theralia – Data Management Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1f 0%, #2a2a32 50%, #1e1e26 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #111114;
            padding: 44px 40px;
            border-radius: 14px;
            box-shadow: 0 16px 56px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.06);
            max-width: 450px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo img {
            max-width: 140px;
            height: auto;
        }
        h1 {
            color: #ffffff;
            margin-bottom: 6px;
            font-size: 22px;
            line-height: 1.3;
            text-align: center;
            letter-spacing: 1px;
        }
        h2 {
            color: #a0a0aa;
            margin-bottom: 14px;
            font-size: 15px;
            font-weight: 400;
            text-align: center;
        }
        .subtitle {
            color: #78787f;
            margin-bottom: 30px;
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #c8c8cf;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="email"] {
            width: 100%;
            padding: 13px 14px;
            border: 2px solid #333340;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #1a1a20;
            color: #e8e8ef;
        }
        input[type="email"]::placeholder {
            color: #55555f;
        }
        input[type="email"]:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08);
            background: #1e1e26;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #111114;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, box-shadow 0.3s;
            letter-spacing: 0.3px;
        }
        button:hover {
            background: #e0e0e8;
            box-shadow: 0 4px 18px rgba(255, 255, 255, 0.12);
        }
        button:disabled { background: #444450; color: #777; cursor: not-allowed; box-shadow: none; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: #2a1515;
            color: #ff6b6b;
            border: 1px solid #4a2020;
            display: block;
        }
        .message.info {
            background: #15202a;
            color: #6bb8ff;
            border: 1px solid #203a4a;
            display: block;
        }
        .portal-logo { display: block; margin: 0 auto 20px; max-width: 240px; }
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            border: none;
            margin: 0 0 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="assets/logos/theralia_logo.png" alt="Theralia Logo" class="portal-logo" onerror="this.style.display='none'">
        </div>
        <hr class="divider">
        <p class="subtitle">Secure access to validated data, project insights, along with partner &amp; investor updates.</p>

        <form id="accessForm">
            <label for="email">Authorized email</label>
            <input type="email" id="email" name="email" placeholder="Authorized email" required>
            <button type="submit" id="submitBtn">Continue</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        const WORKSPACE_SLUG = 'theralia';
        const form = document.getElementById('accessForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Checking...';
            messageDiv.className = 'message';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch('/api/di/access-check?ws=' + WORKSPACE_SLUG, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Workspace-Slug': WORKSPACE_SLUG
                    },
                    body: JSON.stringify({ institution_email: email })
                });

                const data = await response.json();

                if (!data.allowed) {
                    messageDiv.textContent = data.message || 'Access denied. Your email is not in the allowlist.';
                    messageDiv.className = 'message error';
                } else if (data.investor_redirect) {
                    // Investor users use the dedicated investor access flow — pass email to skip re-entry
                    window.location.href = data.investor_redirect + '?email=' + encodeURIComponent(email);
                } else {
                    sessionStorage.setItem('di_email', email);
                    sessionStorage.setItem('di_name', data.name || '');
                    sessionStorage.setItem('di_affiliation', data.affiliation || '');
                    sessionStorage.setItem('di_role', data.role || 'researcher');
                    sessionStorage.setItem('di_workspace_slug', WORKSPACE_SLUG);

                    if (data.next === 'register') {
                        window.location.href = 'register.html?ws=' + WORKSPACE_SLUG;
                    } else {
                        window.location.href = 'login.html?ws=' + WORKSPACE_SLUG;
                    }
                }
            } catch (err) {
                messageDiv.textContent = 'Connection error. Please try again.';
                messageDiv.className = 'message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Continue';
            }
        });
    </script>
</body>
</html>
