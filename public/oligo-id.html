<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oligonucleotide Registry | NAT-Lab GLP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #d1d5db;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .app-header {
            background: #161922;
            border-bottom: 1px solid #2a2d3a;
            padding: 0 20px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .app-header h1 { font-size: 15px; font-weight: 600; color: #e2e8f0; }
        .app-header a {
            color: #6b7280;
            text-decoration: none;
            font-size: 12px;
            padding: 4px 10px;
            border: 1px solid #374151;
            border-radius: 5px;
        }
        .app-header a:hover { color: #d1d5db; border-color: #6b7280; }

        /* ── Three-panel layout ── */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left sidebar ── */
        .sidebar {
            width: 160px;
            min-width: 160px;
            background: #161922;
            border-right: 1px solid #2a2d3a;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4b5563;
            padding: 0 8px 8px;
        }
        .mode-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 8px 10px;
            border: none;
            border-radius: 5px;
            background: transparent;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
        }
        .mode-btn:hover { background: #1e2130; color: #d1d5db; }
        .mode-btn.active { background: #1e3a5f; color: #93c5fd; }
        .mode-btn .badge {
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 999px;
            display: none;
        }
        .mode-btn .badge.show { display: block; }
        .sidebar-divider { height: 1px; background: #2a2d3a; margin: 6px 0; }

        /* ── Middle list panel ── */
        .list-panel {
            width: 340px;
            min-width: 340px;
            background: #12151c;
            border-right: 1px solid #2a2d3a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .list-panel-header {
            padding: 12px 14px 10px;
            border-bottom: 1px solid #2a2d3a;
            flex-shrink: 0;
        }
        .list-panel-header h2 { font-size: 13px; font-weight: 600; color: #e2e8f0; margin-bottom: 8px; }
        .search-row { display: flex; gap: 6px; }
        .search-input {
            flex: 1;
            background: #1e2130;
            border: 1px solid #374151;
            border-radius: 5px;
            padding: 6px 10px;
            color: #d1d5db;
            font-size: 12px;
        }
        .search-input::placeholder { color: #4b5563; }
        .search-input:focus { outline: none; border-color: #3b82f6; }
        .filter-select {
            background: #1e2130;
            border: 1px solid #374151;
            border-radius: 5px;
            padding: 6px 8px;
            color: #d1d5db;
            font-size: 12px;
            cursor: pointer;
        }
        .list-scroll { flex: 1; overflow-y: auto; }
        .list-item {
            padding: 10px 14px;
            border-bottom: 1px solid #1e2130;
            cursor: pointer;
            transition: background 0.1s;
        }
        .list-item:hover { background: #1a1d27; }
        .list-item.selected { background: #1e2f45; border-left: 2px solid #3b82f6; }
        .list-item-name { font-size: 13px; font-weight: 500; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-sub { font-size: 11px; color: #6b7280; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-meta { display: flex; gap: 6px; margin-top: 4px; align-items: center; }
        .tag {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            background: #1e2f45;
            color: #93c5fd;
        }
        .tag.green { background: #1a3a2a; color: #6ee7b7; }
        .tag.amber { background: #3a2a10; color: #fbbf24; }
        .tag.red { background: #3a1a1a; color: #f87171; }
        .tag.gray { background: #2a2d3a; color: #9ca3af; }
        .empty-list { padding: 32px 16px; text-align: center; color: #4b5563; font-size: 13px; }

        /* ── Right detail panel ── */
        .detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0f1117;
        }
        .detail-panel-header {
            padding: 12px 20px 10px;
            border-bottom: 1px solid #2a2d3a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .detail-title { font-size: 15px; font-weight: 600; color: #e2e8f0; }
        .detail-subtitle { font-size: 11px; color: #6b7280; margin-top: 2px; }
        .toggle-group { display: flex; gap: 0; border: 1px solid #374151; border-radius: 6px; overflow: hidden; }
        .toggle-btn {
            padding: 5px 14px;
            border: none;
            background: transparent;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        .toggle-btn.active { background: #1e3a5f; color: #93c5fd; }
        .toggle-btn:hover:not(.active) { background: #1e2130; color: #d1d5db; }
        .detail-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .detail-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #374151; font-size: 13px; text-align: center; }

        /* ── Sections/Tables ── */
        .section { margin-bottom: 22px; }
        .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #6b7280; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2d3a; }
        .kv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .kv-table tr td:first-child { color: #6b7280; width: 160px; padding: 5px 0; vertical-align: top; }
        .kv-table tr td:last-child { color: #d1d5db; padding: 5px 0; word-break: break-all; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .data-table th { text-align: left; padding: 6px 8px; background: #161922; color: #6b7280; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2d3a; }
        .data-table td { padding: 7px 8px; border-bottom: 1px solid #1e2130; color: #d1d5db; vertical-align: top; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #161922; }

        /* ── Sequence display ── */
        .sequence-block {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: #161922;
            border: 1px solid #2a2d3a;
            border-radius: 6px;
            padding: 10px 12px;
            word-break: break-all;
            line-height: 1.6;
            color: #a5f3fc;
        }

        /* ── Forms ── */
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 11px; font-weight: 600; color: #9ca3af; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: #1e2130;
            border: 1px solid #374151;
            border-radius: 5px;
            padding: 7px 10px;
            color: #d1d5db;
            font-size: 13px;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #3b82f6; }
        .form-textarea { resize: vertical; min-height: 70px; font-family: inherit; }
        .form-row { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
        .form-row-3 { display: grid; gap: 10px; grid-template-columns: 1fr 1fr 1fr; }
        .form-hint { font-size: 11px; color: #4b5563; margin-top: 3px; }

        /* ── Buttons ── */
        .btn {
            padding: 7px 14px;
            border-radius: 5px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #1e2130; border: 1px solid #374151; color: #d1d5db; }
        .btn-secondary:hover { background: #252a3a; }
        .btn-danger { background: #7f1d1d; color: #fca5a5; }
        .btn-danger:hover { background: #991b1b; }
        .btn-success { background: #14532d; color: #86efac; border: 1px solid #166534; }
        .btn-success:hover { background: #166534; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

        /* ── Upload zone ── */
        .upload-zone {
            border: 2px dashed #374151;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .upload-zone:hover, .upload-zone.drag { border-color: #3b82f6; }
        .upload-zone p { font-size: 13px; color: #6b7280; margin-top: 6px; }
        .upload-zone strong { font-size: 14px; color: #9ca3af; }

        /* ── Alerts ── */
        .alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; }
        .alert-success { background: #1a3a2a; border: 1px solid #166534; color: #86efac; }
        .alert-error { background: #3a1a1a; border: 1px solid #7f1d1d; color: #fca5a5; }
        .alert-warn { background: #3a2a10; border: 1px solid #92400e; color: #fbbf24; }
        .alert-info { background: #1e2f45; border: 1px solid #1e40af; color: #93c5fd; }

        /* ── Copy button inline ── */
        .copy-btn {
            background: none;
            border: none;
            color: #4b5563;
            cursor: pointer;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .copy-btn:hover { color: #93c5fd; background: #1e2f45; }

        /* ── Mod grid ── */
        .mod-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .mod-cell { background: #161922; border: 1px solid #2a2d3a; border-radius: 5px; padding: 6px 8px; }
        .mod-cell-label { font-size: 10px; color: #4b5563; text-transform: uppercase; margin-bottom: 2px; }
        .mod-cell-value { font-size: 12px; color: #d1d5db; font-family: monospace; }
        .mod-cell-value.none { color: #374151; font-style: italic; }

        /* ── Scrollbars ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

        /* ── Loading spinner ── */
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #374151; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Misc ── */
        .text-muted { color: #4b5563; }
        .text-mono { font-family: monospace; font-size: 12px; }
        .hidden { display: none !important; }
        hr.divider { border: none; border-top: 1px solid #2a2d3a; margin: 14px 0; }
    </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
    <h1>Oligonucleotide Registry</h1>
    <a href="/pi-dashboard.html">← Dashboard</a>
</header>

<!-- Three-panel body -->
<div class="app-body">

    <!-- Left sidebar -->
    <nav class="sidebar">
        <div class="sidebar-label">Workspace</div>
        <button class="mode-btn active" data-mode="registry">Registry</button>
        <button class="mode-btn" data-mode="data-sources">Data Sources</button>
        <div class="sidebar-divider"></div>
        <button class="mode-btn" data-mode="create">Create Oligo</button>
        <div class="sidebar-divider"></div>
        <button class="mode-btn" data-mode="library">Library</button>
        <button class="mode-btn" data-mode="duplicates">Duplicates <span class="badge" id="dup-badge">0</span></button>
        <button class="mode-btn" data-mode="certificates">Certificates</button>
    </nav>

    <!-- Middle list panel -->
    <div class="list-panel" id="list-panel">
        <!-- Populated by JS per mode -->
    </div>

    <!-- Right detail panel -->
    <div class="detail-panel" id="detail-panel">
        <div class="detail-placeholder" id="detail-placeholder">
            <div>
                <div style="font-size:32px;margin-bottom:12px;">🧬</div>
                <div>Select an item to view details</div>
            </div>
        </div>
        <!-- Detail content injected here -->
        <div id="detail-content" class="hidden" style="display:flex;flex-direction:column;overflow:hidden;flex:1;">
            <div class="detail-panel-header" id="detail-header">
                <div>
                    <div class="detail-title" id="detail-title"></div>
                    <div class="detail-subtitle" id="detail-subtitle"></div>
                </div>
                <div class="toggle-group" id="detail-toggle">
                    <button class="toggle-btn active" data-toggle="view" onclick="setDetailToggle('view')">View</button>
                    <button class="toggle-btn" data-toggle="actions" onclick="setDetailToggle('actions')">Actions</button>
                </div>
            </div>
            <div class="detail-scroll" id="detail-view-pane"></div>
            <div class="detail-scroll hidden" id="detail-actions-pane"></div>
        </div>
    </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const S = {
    mode: 'registry',
    selectedOligoId: null,
    selectedLibraryId: null,
    selectedSourceId: null,
    selectedCertId: null,
    detailToggle: 'view',
    registryList: [],
    libraryList: [],
    sourceList: [],
    dupList: [],
    certList: [],
    searchQ: '',
    filterStatus: '',
    filterLib: '',
    currentOligo: null,
    selectedBatchIdx: 0,
};

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => switchMode(btn.dataset.mode));
    });
    switchMode('registry');
    loadDupCount();
});

// ─── Mode switching ───────────────────────────────────────────────────────────
function switchMode(mode) {
    S.mode = mode;
    S.selectedOligoId = null;
    S.selectedLibraryId = null;
    S.selectedSourceId = null;
    S.detailToggle = 'view';
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    clearDetail();
    renderListPanel();
}

function renderListPanel() {
    const lp = document.getElementById('list-panel');
    switch (S.mode) {
        case 'registry':     renderRegistryList(lp); break;
        case 'data-sources': renderSourceList(lp);   break;
        case 'create':       renderCreatePanel(lp);   break;
        case 'library':      renderLibraryList(lp);   break;
        case 'duplicates':   renderDupList(lp);       break;
        case 'certificates': renderCertList(lp);      break;
    }
}

// ─── Detail panel helpers ─────────────────────────────────────────────────────
function showDetail(title, subtitle, viewHtml, actionsHtml) {
    document.getElementById('detail-placeholder').classList.add('hidden');
    const dc = document.getElementById('detail-content');
    dc.classList.remove('hidden');
    dc.style.display = 'flex';
    document.getElementById('detail-title').textContent = title;
    document.getElementById('detail-subtitle').textContent = subtitle || '';
    document.getElementById('detail-view-pane').innerHTML = viewHtml;
    document.getElementById('detail-actions-pane').innerHTML = actionsHtml || '<div class="text-muted" style="padding:20px;">No actions available.</div>';
    setDetailToggle(S.detailToggle);
    const tog = document.getElementById('detail-toggle');
    if (actionsHtml) tog.classList.remove('hidden');
    else tog.classList.add('hidden');
}

function clearDetail() {
    document.getElementById('detail-placeholder').classList.remove('hidden');
    const dc = document.getElementById('detail-content');
    dc.classList.add('hidden');
    dc.style.display = 'none';
}

function setDetailToggle(tog) {
    S.detailToggle = tog;
    document.querySelectorAll('#detail-toggle .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.toggle === tog));
    document.getElementById('detail-view-pane').classList.toggle('hidden', tog !== 'view');
    document.getElementById('detail-actions-pane').classList.toggle('hidden', tog !== 'actions');
}

// ─── Alerts ───────────────────────────────────────────────────────────────────
function showAlert(containerId, type, msg) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = `<div class="alert alert-${type}">${esc(msg)}</div>`;
    setTimeout(() => { if (el) el.innerHTML = ''; }, 5000);
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s) { return s ? new Date(s).toLocaleDateString() : '—'; }
function fmtMod(v) { return (!v || v === '-') ? `<span class="none">—</span>` : esc(v); }
function copyText(t) { navigator.clipboard.writeText(t).catch(()=>{}); }
async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const r = await fetch(path, opts);
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || data.message || `HTTP ${r.status}`);
    return data;
}

// ─── Dup count ────────────────────────────────────────────────────────────────
async function loadDupCount() {
    try {
        const data = await api('GET', '/api/oligo/duplicates');
        const n = (data.duplicates || []).length;
        const badge = document.getElementById('dup-badge');
        badge.textContent = n;
        badge.classList.toggle('show', n > 0);
    } catch (_) {}
}

// ═══════════════════════════════════════════════════════════════════════════════
// REGISTRY MODE
// ═══════════════════════════════════════════════════════════════════════════════
function renderRegistryList(lp) {
    lp.innerHTML = `
        <div class="list-panel-header">
            <h2>Registry</h2>
            <div class="search-row">
                <input class="search-input" id="reg-search" placeholder="Search name / sequence…" oninput="regFilter()">
                <select class="filter-select" id="reg-status" onchange="regFilter()">
                    <option value="">All</option>
                    <option value="ACTIVE">Active</option>
                    <option value="DRAFT">Draft</option>
                    <option value="RETIRED">Retired</option>
                </select>
            </div>
        </div>
        <div class="list-scroll" id="reg-list"><div class="empty-list"><div class="spinner"></div></div></div>
    `;
    loadRegistry();
}

async function loadRegistry() {
    try {
        const data = await api('GET', '/api/oligo/oligos');
        S.registryList = data.oligos || [];
        regFilter();
    } catch (e) {
        document.getElementById('reg-list').innerHTML = `<div class="empty-list">Error: ${esc(e.message)}</div>`;
    }
}

function regFilter() {
    const q = (document.getElementById('reg-search')?.value || '').toLowerCase();
    const st = document.getElementById('reg-status')?.value || '';
    let items = S.registryList;
    if (q) items = items.filter(o =>
        (o.display_name||'').toLowerCase().includes(q) ||
        (o.sequence_norm||'').toLowerCase().includes(q)
    );
    if (st) items = items.filter(o => o.status === st);
    const list = document.getElementById('reg-list');
    if (!list) return;
    if (!items.length) { list.innerHTML = `<div class="empty-list">No oligonucleotides found</div>`; return; }
    list.innerHTML = items.map(o => {
        const seqPreview = (o.sequence_norm||'').substring(0, 32) + ((o.sequence_norm||'').length > 32 ? '…' : '');
        const batchCount = o.synthesis_count || 0;
        return `
        <div class="list-item${o.id === S.selectedOligoId ? ' selected' : ''}" onclick="selectOligo('${o.id}')">
            <div class="list-item-name">${esc(o.display_name || '—')}</div>
            <div class="list-item-sub text-mono">${esc(seqPreview)}</div>
            <div class="list-item-meta">
                ${batchCount > 0 ? `<span class="tag gray">${batchCount} batch${batchCount > 1 ? 'es' : ''}</span>` : ''}
            </div>
        </div>`;
    }).join('');
}

function statusColor(s) {
    if (s === 'ACTIVE') return 'green';
    if (s === 'RETIRED') return 'red';
    return 'gray';
}

async function selectOligo(id) {
    S.selectedOligoId = id;
    regFilter(); // re-render list to highlight
    showDetail('Loading…', '', '<div style="padding:20px;"><div class="spinner"></div></div>', null);
    try {
        const data = await api('GET', `/api/oligo/oligos/${id}`);
        // Merge related arrays into the oligo object for convenience
        const o = data.oligo;
        o.syntheses = data.syntheses || [];
        o.libraries = data.libraries || [];
        o.identity_docs = data.identity_docs || [];
        renderOligoDetail(o);
    } catch (e) {
        showDetail('Error', '', `<div class="alert alert-error">${esc(e.message)}</div>`, null);
    }
}

function renderOligoDetail(o) {
    S.currentOligo = o;
    S.selectedBatchIdx = 0;
    const batchCount = (o.syntheses || []).length;
    const subtitle = batchCount > 0 ? `${batchCount} batch${batchCount > 1 ? 'es' : ''}` : 'No batches';
    showDetail(
        o.display_name || '—',
        subtitle,
        _buildOligoViewHtml(),
        buildOligoActionsHtml(o)
    );
}

function selectBatch(idx) {
    S.selectedBatchIdx = parseInt(idx, 10);
    const pane = document.getElementById('detail-view-pane');
    if (pane) pane.innerHTML = _buildOligoViewHtml();
}

function copyOligoSequence() {
    copyText(S.currentOligo?.sequence_norm || '');
}

function _buildOligoViewHtml() {
    const o = S.currentOligo;
    const syntheses = o.syntheses || [];
    const synth = syntheses[S.selectedBatchIdx] || null;

    // Batch selector (only when multiple batches)
    let batchSelectorHtml = '';
    if (syntheses.length > 1) {
        const options = syntheses.map((s, i) =>

async function setOligoStatus(id, status) {
    try {
        await api('PATCH', `/api/oligo/oligos/${id}/status`, { status });
        await selectOligo(id);
        loadRegistry();
    } catch (e) {
        showAlert('oligo-actions-alert', 'error', e.message);
    }
}

async function saveOligoEdit(id) {
    try {
        const body = {
            display_name: document.getElementById('edit-name')?.value?.trim(),
            notes: document.getElementById('edit-notes')?.value?.trim(),
            mod5: document.getElementById('edit-mod5')?.value?.trim(),
            mod3: document.getElementById('edit-mod3')?.value?.trim(),
            mod_int_5: document.getElementById('edit-mod-int5')?.value?.trim(),
            mod_int_6: document.getElementById('edit-mod-int6')?.value?.trim(),
            mod_int_7: document.getElementById('edit-mod-int7')?.value?.trim(),
            mod_int_8: document.getElementById('edit-mod-int8')?.value?.trim(),
        };
        await api('PATCH', `/api/oligo/oligos/${id}`, body);
        await selectOligo(id);
        loadRegistry();
    } catch (e) {
        showAlert('oligo-actions-alert', 'error', e.message);
    }
}

async function populateLibSelect() {
    try {
        const data = await api('GET', '/api/oligo/libraries');
        const sel = document.getElementById('lib-add-select');
        if (!sel) return;
        sel.innerHTML = (data.libraries||[]).map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
    } catch (_) {}
}

async function addOligoToLib(oligoId) {
    const libId = document.getElementById('lib-add-select')?.value;
    if (!libId) return;
    try {
        await api('POST', `/api/oligo/libraries/${libId}/members`, { oligo_id: oligoId });
        showAlert('oligo-actions-alert', 'success', 'Added to library.');
        await selectOligo(oligoId);
    } catch (e) {
        showAlert('oligo-actions-alert', 'error', e.message);
    }
}

async function createLibWithOligo(oligoId) {
    const name = document.getElementById('new-lib-name')?.value?.trim();
    if (!name) return;
    try {
        const lib = await api('POST', '/api/oligo/libraries', { name });
        await api('POST', `/api/oligo/libraries/${lib.library.id}/members`, { oligo_id: oligoId });
        showAlert('oligo-actions-alert', 'success', `Library "${name}" created and oligo added.`);
        await selectOligo(oligoId);
    } catch (e) {
        showAlert('oligo-actions-alert', 'error', e.message);
    }
}

async function uploadDoc(oligoId) {
    const input = document.getElementById('doc-file-input');
    const file = input?.files?.[0];
    if (!file) return;
    const status = document.getElementById('doc-upload-status');
    if (status) status.textContent = 'Uploading…';
    try {
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch(`/api/oligo/oligos/${oligoId}/upload-doc`, { method: 'POST', body: fd });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
        if (status) status.textContent = 'Uploaded successfully.';
        setTimeout(() => selectOligo(oligoId), 800);
    } catch (e) {
        if (status) status.textContent = `Error: ${e.message}`;
    }
}

async function downloadDoc(docId) {
    try {
        const data = await api('GET', `/api/oligo/identity-docs/${docId}/download`);
        if (data.url) window.open(data.url, '_blank');
    } catch (e) {
        alert('Could not get download link: ' + e.message);
    }
}

async function loadSourceList() {

async function handleExcelUpload() {
    const input = document.getElementById('excel-file-input');
    const file = input?.files?.[0];
    if (!file) return;
    const supplier = document.getElementById('src-supplier')?.value || 'biomers';
    const progress = document.getElementById('excel-upload-progress');
    if (progress) progress.innerHTML = `<div class="spinner"></div> Parsing and importing…`;

    try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('supplier', supplier);
        const r = await fetch('/api/oligo/excel-upload', { method: 'POST', body: fd });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);

        const { probes_inserted=0, probes_reused=0, syntheses_inserted=0, duplicates_detected=0, library_candidates=[], warnings=[] } = d;
        let html = `<div class="alert alert-success">Import complete — ${probes_inserted} identities new, ${probes_reused} identities reused, ${syntheses_inserted} synthesis batches inserted, ${duplicates_detected} duplicates detected.</div>`;
        if (warnings.length) {
            html += `<div class="alert alert-warn">${warnings.length} warning(s):<ul style="margin-top:6px;padding-left:18px;">${warnings.slice(0,10).map(w=>`<li>${esc(w.message||w)}</li>`).join('')}</ul></div>`;
        }
        if (library_candidates.length) {
            html += `<div class="alert alert-info">Library candidates detected (≥12 oligos per order):<ul style="margin-top:6px;padding-left:18px;">${library_candidates.map(orderNo=>`<li>${esc(orderNo)}</li>`).join('')}</ul><div style="margin-top:8px;">${library_candidates.map(orderNo=>`<button class="btn btn-success btn-sm" onclick="createLibFromOrder('${esc(orderNo)}','${supplier}')">Create library for ${esc(orderNo)}</button>`).join(' ')}</div></div>`;
        }
        if (progress) progress.innerHTML = html;
        loadSourceList();
        loadRegistry();
    } catch (e) {
        if (progress) progress.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`;
    }
    input.value = '';
}

async function createLibFromOrder(orderNumber, supplier) {
    try {
        const data = await api('POST', '/api/oligo/libraries/from-order', { order_number: orderNumber, supplier, name: `${orderNumber} Library` });
        showAlert('src-upload-alert', 'success', `Library created with ${data.added||0} members.`);
    } catch (e) {
        showAlert('src-upload-alert', 'error', e.message);
    }
}

// Drag-and-drop for excel upload zone
document.addEventListener('DOMContentLoaded', () => {
    document.body.addEventListener('dragover', e => {
        const zone = document.getElementById('excel-drop-zone');
        if (zone) { e.preventDefault(); zone.classList.add('drag'); }
    });
    document.body.addEventListener('dragleave', () => {
        const zone = document.getElementById('excel-drop-zone');
        if (zone) zone.classList.remove('drag');
    });
    document.body.addEventListener('drop', e => {
        const zone = document.getElementById('excel-drop-zone');
        if (!zone) return;
        e.preventDefault();
        zone.classList.remove('drag');
        const file = e.dataTransfer?.files?.[0];
        if (file) {
            const input = document.getElementById('excel-file-input');
            if (input) {
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                handleExcelUpload();
            }
        }
    });
});

async function createOligo() {
    const name = document.getElementById('c-name')?.value?.trim();
    const seq = document.getElementById('c-seq')?.value?.trim().replace(/\s+/g,'').toUpperCase();
    if (!name) { showAlert('create-alert', 'error', 'OLIGONAME is required.'); return; }
    if (!seq || seq.length < 4) { showAlert('create-alert', 'error', 'Sequence is required (min 4 nt).'); return; }

    const body = {
        display_name: name,
        sequence: seq,
        mod5: document.getElementById('c-mod5')?.value?.trim() || null,
        mod3: document.getElementById('c-mod3')?.value?.trim() || null,
        mod_int_5: document.getElementById('c-modi5')?.value?.trim() || null,
        mod_int_6: document.getElementById('c-modi6')?.value?.trim() || null,
        mod_int_7: document.getElementById('c-modi7')?.value?.trim() || null,
        mod_int_8: document.getElementById('c-modi8')?.value?.trim() || null,
        notes: document.getElementById('c-notes')?.value?.trim() || null,
    };

    // Synthesis batch
    const supplier = document.getElementById('c-supplier')?.value?.trim();
    const orderNo = document.getElementById('c-order')?.value?.trim();
    if (supplier || orderNo) {
        body.synthesis_batch = {
            supplier,
            order_number: orderNo,
            oligo_number: document.getElementById('c-oligo-no')?.value?.trim() || null,
            synthesis_date: document.getElementById('c-synth-date')?.value || null,
            amount_nmol: document.getElementById('c-amount')?.value ? parseFloat(document.getElementById('c-amount').value) : null,
            mw_value: document.getElementById('c-mw')?.value ? parseFloat(document.getElementById('c-mw').value) : null,
        };
    }

    try {
        const data = await api('POST', '/api/oligo/oligos', body);
        const newId = data.oligo?.id;

        // Attach doc if selected
        const docFile = document.getElementById('c-doc-file')?.files?.[0];
        if (docFile && newId) {
            const fd = new FormData();
            fd.append('file', docFile);
            await fetch(`/api/oligo/oligos/${newId}/upload-doc`, { method: 'POST', body: fd });
        }

        showAlert('create-alert', 'success', 'Oligonucleotide created successfully.');
        // Clear form
        ['c-name','c-seq','c-mod5','c-mod3','c-modi5','c-modi6','c-modi7','c-modi8','c-notes','c-supplier','c-order','c-oligo-no','c-amount','c-mw'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        loadRegistry();

        // Switch to registry and select new oligo
        if (newId) {
            switchMode('registry');
            setTimeout(() => selectOligo(newId), 300);
        }
    } catch (e) {
        showAlert('create-alert', 'error', e.message);
    }
}

function renderLibraryList(lp) {
    lp.innerHTML = `
        <div class="list-panel-header">
            <h2>Libraries</h2>
            <div class="search-row">
                <input class="search-input" id="lib-search" placeholder="Search libraries…" oninput="libFilter()">
            </div>
        </div>
        <div class="list-scroll" id="lib-list"><div class="empty-list"><div class="spinner"></div></div></div>
    `;
    showDetail('Libraries', 'Manage oligonucleotide libraries', buildLibraryCreateView(), null);
    loadLibraryList();
}

function buildLibraryCreateView() {
    return `
        <div id="lib-create-alert"></div>
        <div class="section">
            <div class="section-title">Create New Library</div>
            <div class="form-group">
                <label class="form-label">Library Name</label>
                <input class="form-input" id="new-lib-create-name" placeholder="e.g. hsa-miR panel 78">
            </div>
            <div class="form-group">
                <label class="form-label">Description (optional)</label>
                <textarea class="form-textarea" id="new-lib-desc" style="min-height:50px;"></textarea>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="createLibrary()">Create Library</button>
            </div>
        </div>
        <hr class="divider">
        <div class="section">
            <div class="section-title">About Libraries</div>
            <p style="font-size:13px;color:#6b7280;line-height:1.6;">Libraries group oligonucleotides that are used together as a panel or set. Orders with ≥12 oligos are automatically flagged as library candidates during Excel import.</p>
        </div>
    `;
}

async function loadLibraryList() {
    try {
        const data = await api('GET', '/api/oligo/libraries');
        S.libraryList = data.libraries || [];
        libFilter();
    } catch (e) {
        const list = document.getElementById('lib-list');
        if (list) list.innerHTML = `<div class="empty-list">Error loading libraries</div>`;
    }
}

function libFilter() {
    const q = (document.getElementById('lib-search')?.value || '').toLowerCase();
    let items = S.libraryList;
    if (q) items = items.filter(l => (l.name||'').toLowerCase().includes(q));
    const list = document.getElementById('lib-list');
    if (!list) return;
    if (!items.length) { list.innerHTML = `<div class="empty-list">No libraries</div>`; return; }
    list.innerHTML = items.map(l => `
        <div class="list-item${l.id === S.selectedLibraryId ? ' selected' : ''}" onclick="selectLibrary('${l.id}')">
            <div class="list-item-name">${esc(l.name)}</div>
            <div class="list-item-sub">${l.member_count||0} member${l.member_count!==1?'s':''}</div>
            <div class="list-item-meta">
                <span class="tag gray">${fmtDate(l.created_at)}</span>
            </div>
        </div>
    `).join('');
}

async function createLibrary() {
    const name = document.getElementById('new-lib-create-name')?.value?.trim();
    if (!name) return;
    try {
        await api('POST', '/api/oligo/libraries', {
            name,
            description: document.getElementById('new-lib-desc')?.value?.trim() || null
        });
        showAlert('lib-create-alert', 'success', `Library "${name}" created.`);
        document.getElementById('new-lib-create-name').value = '';
        document.getElementById('new-lib-desc').value = '';
        await loadLibraryList();
    } catch (e) {
        showAlert('lib-create-alert', 'error', e.message);
    }
}

async function selectLibrary(id) {
    S.selectedLibraryId = id;
    libFilter();
    showDetail('Loading…', '', '<div style="padding:20px;"><div class="spinner"></div></div>', null);
    try {
        const data = await api('GET', `/api/oligo/libraries/${id}`);
        renderLibraryDetail(data.library);
    } catch (e) {
        showDetail('Error', '', `<div class="alert alert-error">${esc(e.message)}</div>`, null);
    }
}

function renderLibraryDetail(lib) {
    const members = lib.members || [];
    const viewHtml = `
        <div class="section">
            <div class="section-title">Library Info</div>
            <table class="kv-table">
                <tr><td>Name</td><td><strong>${esc(lib.name)}</strong></td></tr>
                ${lib.description ? `<tr><td>Description</td><td>${esc(lib.description)}</td></tr>` : ''}
                <tr><td>Members</td><td>${members.length}</td></tr>
                <tr><td>Created</td><td>${fmtDate(lib.created_at)}</td></tr>
            </table>
        </div>
        <div class="section">
            <div class="section-title">Members</div>
            ${members.length ? `
            <table class="data-table">
                <thead><tr><th>Name</th><th>Sequence (preview)</th><th>Status</th></tr></thead>
                <tbody>${members.map(m => `
                    <tr>
                        <td><a href="#" onclick="switchMode('registry');setTimeout(()=>selectOligo('${m.oligo_id||m.id}'),200);return false;" style="color:#93c5fd;">${esc(m.display_name||m.canonical_id||'—')}</a></td>
                        <td class="text-mono">${esc((m.sequence_norm||'').substring(0,24))}${(m.sequence_norm||'').length>24?'…':''}</td>
                        <td><span class="tag ${statusColor(m.status)}">${m.status||'—'}</span></td>
                    </tr>
                `).join('')}</tbody>
            </table>
            ` : '<p class="text-muted" style="font-size:13px;">No members.</p>'}
        </div>
    `;

    const actionsHtml = `
        <div id="lib-actions-alert"></div>
        <div class="section">
            <div class="section-title">Add Member</div>
            <div class="form-group">
                <label class="form-label">Search oligonucleotides</label>
                <input class="form-input" id="lib-oligo-search" placeholder="Type name or ID…" oninput="libOligoSearch()">
            </div>
            <div id="lib-oligo-results" style="margin-top:6px;"></div>
        </div>
        <hr class="divider">
        <div class="section">
            <div class="section-title">Remove Member</div>
            <select class="filter-select" id="lib-remove-select" style="width:100%;">
                ${members.map(m => `<option value="${m.oligo_id||m.id}">${esc(m.display_name||m.canonical_id||m.id)}</option>`).join('')}
            </select>
            <div class="btn-row">
                <button class="btn btn-danger btn-sm" onclick="removeMember('${lib.id}')">Remove Selected</button>
            </div>
        </div>
        <hr class="divider">
        <div class="section">
            <div class="section-title">Danger Zone</div>
            <button class="btn btn-danger btn-sm" onclick="deleteLibrary('${lib.id}','${esc(lib.name)}')">Delete Library</button>
        </div>
    `;

    showDetail(lib.name, `${members.length} members`, viewHtml, actionsHtml);
}

function libOligoSearch() {
    const q = (document.getElementById('lib-oligo-search')?.value || '').toLowerCase();
    if (q.length < 2) { document.getElementById('lib-oligo-results').innerHTML = ''; return; }
    const matches = S.registryList.filter(o => (o.display_name||'').toLowerCase().includes(q) || (o.canonical_id||'').toLowerCase().includes(q)).slice(0, 8);
    document.getElementById('lib-oligo-results').innerHTML = matches.length
        ? matches.map(o => `<div class="list-item" style="border:1px solid #2a2d3a;border-radius:5px;margin-bottom:4px;cursor:pointer;" onclick="addMemberFromSearch('${o.id}')">
            <div class="list-item-name">${esc(o.display_name||o.canonical_id)}</div>
            <div class="list-item-sub text-mono">${esc((o.sequence_norm||'').substring(0,28))}…</div>
          </div>`).join('')
        : '<p style="font-size:12px;color:#4b5563;">No matches</p>';
}

async function addMemberFromSearch(oligoId) {
    if (!S.selectedLibraryId) return;
    try {
        await api('POST', `/api/oligo/libraries/${S.selectedLibraryId}/members`, { oligo_id: oligoId });
        showAlert('lib-actions-alert', 'success', 'Member added.');
        await selectLibrary(S.selectedLibraryId);
        libFilter();
    } catch (e) {
        showAlert('lib-actions-alert', 'error', e.message);
    }
}

async function removeMember(libId) {
    const oligoId = document.getElementById('lib-remove-select')?.value;
    if (!oligoId) return;
    try {
        await api('DELETE', `/api/oligo/libraries/${libId}/members/${oligoId}`);
        showAlert('lib-actions-alert', 'success', 'Member removed.');
        await selectLibrary(libId);
        libFilter();
    } catch (e) {
        showAlert('lib-actions-alert', 'error', e.message);
    }
}

async function deleteLibrary(libId, name) {
    if (!confirm(`Delete library "${name}"? This cannot be undone.`)) return;
    try {
        await api('DELETE', `/api/oligo/libraries/${libId}`);
        S.selectedLibraryId = null;
        clearDetail();
        await loadLibraryList();
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

function renderDupList(lp) {
    lp.innerHTML = `
        <div class="list-panel-header">
            <h2>Duplicates</h2>
            <p style="font-size:12px;color:#6b7280;margin-top:4px;">Synthesis batches with the same identity</p>
        </div>
        <div class="list-scroll" id="dup-list"><div class="empty-list"><div class="spinner"></div></div></div>
    `;
    loadDups();
}

async function loadDups() {
    try {
        const data = await api('GET', '/api/oligo/duplicates');
        S.dupList = data.duplicates || [];
        const badge = document.getElementById('dup-badge');
        badge.textContent = S.dupList.length;
        badge.classList.toggle('show', S.dupList.length > 0);
        const list = document.getElementById('dup-list');
        if (!list) return;
        if (!S.dupList.length) {
            list.innerHTML = `<div class="empty-list">No duplicates detected</div>`;
            showDetail('No duplicates', 'All synthesis batches have unique identities', '<div style="padding:20px;"><p style="color:#6b7280;font-size:13px;">No duplicate oligonucleotide identities found across synthesis batches.</p></div>', null);
            return;
        }
        list.innerHTML = S.dupList.map((d, i) => `
            <div class="list-item" onclick="showDupDetail(${i})">
                <div class="list-item-name">${esc(d.display_name || d.canonical_id || 'Unknown')}</div>
                <div class="list-item-sub">${d.batch_count||0} synthesis batches with same identity</div>
                <div class="list-item-meta">
                    <span class="tag amber">Duplicate</span>
                    ${d.suppliers ? `<span class="tag gray">${esc(d.suppliers)}</span>` : ''}

            </div>
        `).join('');

    } catch (e) {
        const list = document.getElementById('dup-list');
        if (list) list.innerHTML = `<div class="empty-list">Error loading duplicates</div>`;
    }
}

    const d = S.dupList[idx];

        <div class="section">

                <tr><td>Name</td><td><strong>${esc(d.display_name||'—')}</strong></td></tr>
                <tr><td>Canonical ID</td><td class="text-mono">${esc(d.canonical_id||'—')}</td></tr>
                <tr><td>Sequence</td><td class="text-mono" style="font-size:11px;">${esc((d.sequence_norm||'').substring(0,40))}…</td></tr>
            </table>
        </div>
        <div class="section">
            <div class="section-title">Duplicate Synthesis Batches (${batches.length})</div>
            <table class="data-table">
                <thead><tr><th>Supplier</th><th>Order #</th><th>Oligo #</th><th>Date</th><th>Status</th></tr></thead>

                    <tr>

                        <td>${fmtDate(b.synthesis_date)}</td>

            <div class="section-title">Resolution</div>
            <div class="alert alert-info">To resolve: keep one batch as ACTIVE and discard the others via the Registry → select oligo → Actions → Edit Synthesis Batch.</div>
        </div>
    `;
    showDetail(d.display_name || d.canonical_id || 'Duplicate', `${batches.length} batches`, viewHtml, null);
}

        if (!list) return;
        if (!S.certList.length) {

                <div class="list-item-sub">${esc(c.oligo_name || c.synthesis_label || '—')}</div>

                    <span class="tag ${c.cert_type==='identity'?'':'green'}">${c.cert_type==='identity'?'Identity doc':'Certificate'}</span>

    } catch (e) {

}

function showCertDetail(idx) {
    const c = S.certList[idx];
    if (!c) return;
    const viewHtml = `
        <div class="section">
            <div class="section-title">Document</div>
            <table class="kv-table">
                <tr><td>Filename</td><td>${esc(c.original_filename||'—')}</td></tr>
                <tr><td>Type</td><td>${c.cert_type==='identity'?'Identity document':'Synthesis certificate'}</td></tr>
                <tr><td>Linked to</td><td>${esc(c.oligo_name || c.synthesis_label || '—')}</td></tr>
                <tr><td>Uploaded by</td><td>${esc(c.uploaded_by||'—')}</td></tr>
                <tr><td>Uploaded</td><td>${fmtDate(c.uploaded_at)}</td></tr>
            </table>

                ${c.cert_type==='identity'
                    ? `<button class="btn btn-primary" onclick="downloadDocById('${c.id}')">Download PDF</button>`

                }

    `;
    showDetail(c.original_filename || 'Document', c.oligo_name || '', viewHtml, null);

async function downloadCert(synthId) {
    try {
        const data = await api('GET', `/api/oligo/syntheses/${synthId}/certificate`);
        if (data.url) window.open(data.url, '_blank');
    } catch (e) { alert('Error: ' + e.message); }
}

async function downloadDocById(docId) {
    try {
        const data = await api('GET', `/api/oligo/identity-docs/${docId}/download`);
        if (data.url) window.open(data.url, '_blank');
    } catch (e) { alert('Error: ' + e.message); }
}
