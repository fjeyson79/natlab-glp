<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oligonucleotide Registry | NAT-Lab GLP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #d1d5db;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .app-header {
            background: linear-gradient(135deg, #166534 0%, #15803d 100%);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding: 0 20px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .app-header h1 { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.02em; }
        .app-header a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 12px;
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            transition: all 0.15s;
        }
        .app-header a:hover { color: #fff; border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); }

        /* ── Three-panel layout ── */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left sidebar ── */
        .sidebar {
            width: 160px;
            min-width: 160px;
            background: #161922;
            border-right: 1px solid #2a2d3a;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4b5563;
            padding: 0 8px 8px;
        }
        .mode-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 8px 10px;
            border: none;
            border-radius: 5px;
            background: transparent;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: all 0.12s;
        }
        .mode-btn:hover { background: #1e2130; color: #d1d5db; }
        .mode-btn.active { background: #0a2e1c; color: #6ee7b7; font-weight: 600; }
        .mode-btn .badge {
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 999px;
            display: none;
        }
        .mode-btn .badge.show { display: block; }
        .sidebar-divider { height: 1px; background: #2a2d3a; margin: 6px 0; }

        /* ── Middle list panel ── */
        .list-panel {
            width: 370px;
            min-width: 370px;
            background: #12151c;
            border-right: 1px solid #2a2d3a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .list-panel-header {
            padding: 14px 16px 12px;
            border-bottom: 1px solid #2a2d3a;
            flex-shrink: 0;
        }
        .list-panel-header h2 { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 8px; }
        .search-row { display: flex; gap: 6px; }
        .search-input {
            flex: 1;
            background: #1e2130;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 7px 10px;
            color: #d1d5db;
            font-size: 12px;
            transition: border-color 0.15s;
        }
        .search-input::placeholder { color: #4b5563; }
        .search-input:focus { outline: none; border-color: #16a34a; box-shadow: 0 0 0 2px rgba(22,163,74,0.12); }
        .filter-select {
            background: #1e2130;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 7px 8px;
            color: #d1d5db;
            font-size: 12px;
            cursor: pointer;
        }
        .filter-select:focus { outline: none; border-color: #16a34a; }
        .list-scroll { flex: 1; overflow-y: auto; }

        /* ── Registry cards ── */
        .oligo-card {
            padding: 14px 16px;
            border-bottom: 1px solid #1e2130;
            cursor: pointer;
            transition: background 0.12s;
        }
        .oligo-card:hover { background: #1a1d27; }
        .oligo-card.selected { background: #0a2e1c; border-left: 3px solid #16a34a; }
        .oligo-card-line1 {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .oligo-card-name {
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .oligo-card-length {
            font-size: 11px;
            color: #6b7280;
            margin-top: 3px;
        }
        .oligo-card-seq {
            font-family: "JetBrains Mono", "Fira Code", "Source Code Pro", monospace;
            font-size: 12px;
            letter-spacing: 0.05em;
            text-align: left;
            color: #e2e8f0;
            padding: 4px 0;
            margin: 4px 0;
            line-height: 1.6;
            word-break: break-all;
        }
        .oligo-card-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 11px;
            color: #6b7280;
        }

        /* ── Chem badges ── */
        .chem-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 7px;
            border-radius: 4px;
            line-height: 1.6;
            white-space: nowrap;
        }
        .chem-badge-dna { background: #1e2f45; color: #93c5fd; }
        .chem-badge-rna { background: #0a2e1c; color: #6ee7b7; }
        .chem-badge-2f { background: #2a1f4a; color: #a78bfa; }
        .chem-badge-2ome { background: #3a2a10; color: #fbbf24; }
        .chem-badge-lna { background: #3a1a1a; color: #f87171; }

        /* ── Legacy list items (non-registry modes) ── */
        .list-item {
            padding: 10px 14px;
            border-bottom: 1px solid #1e2130;
            cursor: pointer;
            transition: background 0.1s;
        }
        .list-item:hover { background: #1a1d27; }
        .list-item.selected { background: #0a2e1c; border-left: 2px solid #16a34a; }
        .list-item-name { font-size: 13px; font-weight: 500; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-sub { font-size: 11px; color: #6b7280; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item-meta { display: flex; gap: 6px; margin-top: 4px; align-items: center; }
        .tag {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 3px;
            background: #0a2e1c;
            color: #6ee7b7;
        }
        .tag.green { background: #0a2e1c; color: #6ee7b7; }
        .tag.amber { background: #3a2a10; color: #fbbf24; }
        .tag.red { background: #3a1a1a; color: #f87171; }
        .tag.gray { background: #2a2d3a; color: #9ca3af; }
        .empty-list { padding: 32px 16px; text-align: center; color: #4b5563; font-size: 13px; }

        /* ── Right detail panel ── */
        .detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #0f1117;
        }
        .detail-panel-header {
            padding: 12px 20px 10px;
            border-bottom: 1px solid #2a2d3a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0f1117;
        }
        .detail-title { font-size: 15px; font-weight: 600; color: #e2e8f0; }
        .detail-subtitle { font-size: 11px; color: #6b7280; margin-top: 2px; }
        .toggle-group { display: flex; gap: 0; border: 1px solid #374151; border-radius: 6px; overflow: hidden; }
        .toggle-btn {
            padding: 5px 14px;
            border: none;
            background: transparent;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        .toggle-btn.active { background: #0a2e1c; color: #6ee7b7; }
        .toggle-btn:hover:not(.active) { background: #1e2130; color: #d1d5db; }
        .detail-scroll { flex: 1; overflow-y: auto; padding: 16px 20px; }
        .detail-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: #374151; font-size: 13px; text-align: center; }

        /* ── Premium right-panel canvas ── */
        .canvas-identity {
            text-align: center;
            padding: 32px 24px 0;
        }
        .canvas-oligo-name {
            font-size: 20px;
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: 0.01em;
        }
        .canvas-oligo-meta {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
            font-weight: 400;
        }
        .canvas-seq-wrap {
            padding: 32px 20px 24px;
            text-align: center;
        }
        .canvas-seq {
            font-family: "JetBrains Mono", monospace;
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 0.08em;
            line-height: 1.8;
            text-align: center;
            word-break: break-all;
            display: inline;
        }
        /* Sequence base colors */
        .seq-dna { color: #2563eb; }
        .seq-rna { color: #059669; }
        .seq-2f { color: #7c3aed; }
        .seq-2ome { color: #d97706; }
        .seq-lna { color: #dc2626; }
        .seq-space { display: inline-block; width: 0.3em; }

        /* Terminal modification nodes */
        .term-mod {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            border-radius: 50%;
            font-family: "JetBrains Mono", monospace;
            font-weight: 700;
            margin: 0 6px;
        }
        .term-mod-fam {
            width: 44px; height: 44px;
            background: #16a34a;
            color: #fff;
            font-size: 13px;
        }
        .term-mod-quencher {
            width: 44px; height: 44px;
            background: #18181b;
            color: #fff;
            font-size: 14px;
        }
        .term-mod-generic {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            padding: 4px 10px;
            border: 1.5px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            color: #334155;
            font-family: "JetBrains Mono", monospace;
            font-size: 13px;
            font-weight: 500;
            margin: 0 6px;
        }

        /* Sequence graphical abstract card */
        .seq-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 28px 24px 20px;
            margin: 0 28px 20px;
            text-align: center;
        }
        .seq-card .canvas-seq-wrap { padding: 12px 0 8px; }
        .seq-card .copy-btn { color: #94a3b8; }
        .seq-card .copy-btn:hover { color: #16a34a; background: #f0fdf4; }

        /* Chemistry legend */
        .chem-legend {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: nowrap;
            padding: 8px 0 0;
        }
        .chem-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #64748b;
            font-weight: 500;
            white-space: nowrap;
        }
        .chem-legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .chem-legend-dot.dna { background: #2563eb; }
        .chem-legend-dot.rna { background: #059669; }
        .chem-legend-dot.f2 { background: #7c3aed; }
        .chem-legend-dot.ome { background: #d97706; }
        .chem-legend-dot.lna { background: #dc2626; }

        /* Library icon + hover animation */
        .library-icon {
            font-size: 18px;
            font-weight: 700;
            transition: transform 0.18s ease, letter-spacing 0.18s ease;
            cursor: default;
            display: inline-block;
        }
        .library-icon:hover {
            transform: scale(1.08);
            letter-spacing: 1px;
        }
        .lib-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 24px;
            font-size: 13px;
        }
        .lib-info-grid .lib-info-label {
            color: #6b7280;
        }
        .lib-info-grid .lib-info-value {
            color: #e2e8f0;
        }

        /* Library inline member expansion */
        .lib-member-row {
            padding: 8px 8px;
            border-bottom: 1px solid #1e2130;
            cursor: pointer;
            transition: background 0.12s;
        }
        .lib-member-row:hover { background: #1a1d27; }
        .lib-member-row.expanded { background: #0a2e1c; }
        .lib-member-row:last-child { border-bottom: none; }
        .lib-member-summary {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
        }
        .lib-member-summary .member-name {
            color: #e2e8f0;
            font-weight: 500;
            min-width: 100px;
        }
        .lib-member-summary .member-seq-preview {
            flex: 1;
            font-family: "JetBrains Mono", monospace;
            font-size: 11px;
            color: #6b7280;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .lib-member-summary .member-status {
            flex-shrink: 0;
        }
        .lib-member-expand {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease;
        }
        .lib-member-expand.open {
            max-height: 600px;
        }
        .lib-member-detail {
            padding: 12px 8px 8px;
            border-top: 1px solid #2a2d3a;
            margin-top: 8px;
        }
        .lib-member-detail .seq-card {
            margin: 0 0 12px;
            padding: 16px 12px 12px;
        }
        .lib-member-detail .canvas-seq {
            font-size: 16px;
        }
        .lib-member-props {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px 12px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .lib-member-props .prop-label { color: #6b7280; font-size: 11px; }
        .lib-member-props .prop-value { color: #e2e8f0; }
        .lib-member-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .lib-member-nav button {
            background: #1e2130;
            border: 1px solid #374151;
            border-radius: 4px;
            color: #9ca3af;
            font-size: 12px;
            padding: 3px 10px;
            cursor: pointer;
            transition: all 0.12s;
        }
        .lib-member-nav button:hover { color: #e2e8f0; border-color: #6b7280; }

        /* Canvas sections */
        .canvas-section {
            padding: 0 28px;
            margin-bottom: 20px;
        }
        .canvas-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6b7280;
            margin-bottom: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2a2d3a;
        }
        .canvas-synth-line {
            font-size: 13px;
            color: #d1d5db;
            padding: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.5;
        }
        .canvas-synth-line .synth-detail {
            color: #6b7280;
            font-size: 12px;
        }
        .canvas-lib-line {
            font-size: 13px;
            color: #d1d5db;
            padding: 4px 0;
            line-height: 1.5;
        }
        .canvas-divider {
            border: none;
            border-top: 1px solid #2a2d3a;
            margin: 20px 28px;
        }
        .canvas-intchem {
            font-size: 13px;
            color: #d1d5db;
            text-align: center;
            padding: 0 0 4px;
        }
        .canvas-intchem-label { font-weight: 500; }

        /* ── Sections/Tables (legacy detail views) ── */
        .section { margin-bottom: 22px; }
        .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #6b7280; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid #2a2d3a; }
        .kv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .kv-table tr td:first-child { color: #6b7280; width: 160px; padding: 5px 0; vertical-align: top; }
        .kv-table tr td:last-child { color: #e2e8f0; padding: 5px 0; word-break: break-all; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .data-table th { text-align: left; padding: 6px 8px; background: #1e2130; color: #9ca3af; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #2a2d3a; }
        .data-table td { padding: 7px 8px; border-bottom: 1px solid #1e2130; color: #d1d5db; vertical-align: top; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #1a1d27; }

        /* ── Sequence display (legacy) ── */
        .sequence-block {
            font-family: "JetBrains Mono", monospace;
            font-size: 12px;
            background: #1e2130;
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 10px 12px;
            word-break: break-all;
            line-height: 1.6;
            color: #e2e8f0;
        }

        /* ── Forms ── */
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 11px; font-weight: 600; color: #9ca3af; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            background: #1e2130;
            border: 1px solid #374151;
            border-radius: 5px;
            padding: 7px 10px;
            color: #d1d5db;
            font-size: 13px;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #16a34a; box-shadow: 0 0 0 2px rgba(22,163,74,0.12); }
        .form-textarea { resize: vertical; min-height: 70px; font-family: inherit; }
        .form-row { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
        .form-row-3 { display: grid; gap: 10px; grid-template-columns: 1fr 1fr 1fr; }
        .form-hint { font-size: 11px; color: #6b7280; margin-top: 3px; }

        /* ── Buttons ── */
        .btn {
            padding: 7px 14px;
            border-radius: 5px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.12s;
        }
        .btn-primary { background: #16a34a; color: #fff; }
        .btn-primary:hover { background: #15803d; }
        .btn-secondary { background: #1e2130; border: 1px solid #374151; color: #d1d5db; }
        .btn-secondary:hover { background: #2a2d3a; border-color: #4b5563; }
        .btn-danger { background: #3a1a1a; color: #f87171; border: 1px solid #5a2020; }
        .btn-danger:hover { background: #4a2020; }
        .btn-success { background: #0a2e1c; color: #6ee7b7; border: 1px solid #1a5c35; }
        .btn-success:hover { background: #0f3d26; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

        /* ── Upload zone ── */
        .upload-zone {
            border: 2px dashed #374151;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            background: #1e2130;
        }
        .upload-zone:hover, .upload-zone.drag { border-color: #16a34a; background: #0a2e1c; }
        .upload-zone p { font-size: 13px; color: #6b7280; margin-top: 6px; }
        .upload-zone strong { font-size: 14px; color: #d1d5db; }

        /* ── Alerts ── */
        .alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; }
        .alert-success { background: #0a2e1c; border: 1px solid #1a5c35; color: #6ee7b7; }
        .alert-error { background: #3a1a1a; border: 1px solid #5a2020; color: #f87171; }
        .alert-warn { background: #3a2a10; border: 1px solid #5a4010; color: #fbbf24; }
        .alert-info { background: #1e2f45; border: 1px solid #2a4a6a; color: #93c5fd; }

        /* ── Copy button inline ── */
        .copy-btn {
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .copy-btn:hover { color: #16a34a; background: #0a2e1c; }

        /* ── Mod grid ── */
        .mod-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .mod-cell { background: #1e2130; border: 1px solid #374151; border-radius: 5px; padding: 6px 8px; }
        .mod-cell-label { font-size: 10px; color: #6b7280; text-transform: uppercase; margin-bottom: 2px; }
        .mod-cell-value { font-size: 12px; color: #e2e8f0; font-family: monospace; }
        .mod-cell-value.none { color: #374151; font-style: italic; }

        /* ── Scrollbars ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        /* ── Loading spinner ── */

<script>

const S = {
    mode: 'registry',
    selectedOligoId: null,
    selectedLibraryId: null,
    selectedSourceId: null,
    selectedCertId: null,
    detailToggle: 'view',
    registryList: [],
    libraryList: [],
    sourceList: [],
    dupList: [],
    certList: [],
    searchQ: '',
    filterStatus: '',
    filterLib: '',

    selectedBatchIdx: 0,
    expandedMemberIdx: -1,

};

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', () => switchMode(btn.dataset.mode));

// ─── Mode switching ───────────────────────────────────────────────────────────
function switchMode(mode) {
    S.mode = mode;
    S.selectedOligoId = null;
    S.selectedLibraryId = null;
    S.selectedSourceId = null;
    S.detailToggle = 'view';
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

}

function renderListPanel() {

    switch (S.mode) {
        case 'registry':     renderRegistryList(lp); break;
        case 'data-sources': renderSourceList(lp);   break;
        case 'create':       renderCreatePanel(lp);   break;
        case 'library':      renderLibraryList(lp);   break;
        case 'duplicates':   renderDupList(lp);       break;
        case 'certificates': renderCertList(lp);      break;
    }
}

// ─── Detail panel helpers ─────────────────────────────────────────────────────
function showDetail(title, subtitle, viewHtml, actionsHtml) {
    document.getElementById('detail-placeholder').classList.add('hidden');
    const dc = document.getElementById('detail-content');
    dc.classList.remove('hidden');
    dc.style.display = 'flex';
    document.getElementById('detail-title').textContent = title;
    document.getElementById('detail-subtitle').textContent = subtitle || '';
    document.getElementById('detail-view-pane').innerHTML = viewHtml;
    document.getElementById('detail-actions-pane').innerHTML = actionsHtml || '<div class="text-muted" style="padding:20px;">No actions available.</div>';
    setDetailToggle(S.detailToggle);
    const tog = document.getElementById('detail-toggle');
    if (actionsHtml) tog.classList.remove('hidden');
    else tog.classList.add('hidden');
}

function showCanvasDetail(canvasHtml, actionsHtml) {
    document.getElementById('detail-placeholder').classList.add('hidden');
    const dc = document.getElementById('detail-content');
    dc.classList.remove('hidden');
    dc.style.display = 'flex';
    document.getElementById('detail-title').textContent = '';
    document.getElementById('detail-subtitle').textContent = '';
    document.getElementById('detail-header').style.display = actionsHtml ? '' : 'none';
    document.getElementById('detail-view-pane').innerHTML = canvasHtml;
    document.getElementById('detail-actions-pane').innerHTML = actionsHtml || '<div class="text-muted" style="padding:20px;">No actions available.</div>';
    setDetailToggle(S.detailToggle);
    const tog = document.getElementById('detail-toggle');
    if (actionsHtml) {
        tog.classList.remove('hidden');
        document.getElementById('detail-header').style.display = '';
        document.getElementById('detail-title').textContent = S.currentOligo?.display_name || '';
        document.getElementById('detail-subtitle').textContent = '';

    else tog.classList.add('hidden');
}

function clearDetail() {
    document.getElementById('detail-placeholder').classList.remove('hidden');
    const dc = document.getElementById('detail-content');
    dc.classList.add('hidden');
    dc.style.display = 'none';
    document.getElementById('detail-header').style.display = '';
}

function setDetailToggle(tog) {
    S.detailToggle = tog;
    document.querySelectorAll('#detail-toggle .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.toggle === tog));
    document.getElementById('detail-view-pane').classList.toggle('hidden', tog !== 'view');
    document.getElementById('detail-actions-pane').classList.toggle('hidden', tog !== 'actions');

// ─── Alerts ───────────────────────────────────────────────────────────────────
function showAlert(containerId, type, msg) {
    const el = document.getElementById(containerId);
    if (!el) return;
    el.innerHTML = `<div class="alert alert-${type}">${esc(msg)}</div>`;
    setTimeout(() => { if (el) el.innerHTML = ''; }, 5000);
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s) { return s ? new Date(s).toLocaleDateString() : '\u2014'; }
function fmtMod(v) {
    if (!v || v === '-') return `<span class="none">\u2014</span>`;
    // Ensure LNA values like "+A" display as "+A LNA"
    const lnaBare = v.trim().match(/^\+([A-Za-z])$/);
    if (lnaBare) return esc(v.trim() + ' LNA');
    return esc(v);
}
function copyText(t) { navigator.clipboard.writeText(t).catch(()=>{}); }
async function api(method, path, body) {
    const opts = { method, headers: {} };
    if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
    const r = await fetch(path, opts);
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || data.message || `HTTP ${r.status}`);
    return data;
}

// ─── Dup count ────────────────────────────────────────────────────────────────
async function loadDupCount() {
    try {
        const data = await api('GET', '/api/oligo/duplicates');
        const n = (data.duplicates || []).length;
        const badge = document.getElementById('dup-badge');
        badge.textContent = n;
        badge.classList.toggle('show', n > 0);

}

// ═══════════════════════════════════════════════════════════════════════════════
// SEQUENCE RENDERING HELPERS
// ═══════════════════════════════════════════════════════════════════════════════

function parseSequenceTokens(seq, polymerType) {
    if (!seq) return [];
    const tokens = [];
    const basis = (polymerType || 'DNA').toUpperCase() === 'RNA' ? 'rna' : 'dna';
    let i = 0;
    while (i < seq.length) {
        // Check for modification prefixes: m=2'OMe, f=2'F, l=LNA
        if (i + 1 < seq.length) {
            const ch = seq[i];
            const next = seq[i + 1];
            if (ch === 'm' && /[A-Za-z]/.test(next)) {
                tokens.push({ base: next.toUpperCase(), type: '2ome', display: 'm' + next.toUpperCase(), modCode: 7 });
                i += 2; continue;
            }
            if (ch === 'f' && /[A-Za-z]/.test(next)) {
                tokens.push({ base: next.toUpperCase(), type: '2f', display: 'f' + next.toUpperCase(), modCode: 6 });
                i += 2; continue;
            }
            if (ch === 'l' && /[A-Za-z]/.test(next)) {
                tokens.push({ base: next.toUpperCase(), type: 'lna', display: 'l' + next.toUpperCase(), modCode: 8 });
                i += 2; continue;
            }
        }
        const ch = seq[i];
        // Numeric tokens are internal modification codes
        if (/[0-9]/.test(ch)) {
            const code = parseInt(ch, 10);
            const typeMap = { 6: '2f', 7: '2ome', 8: 'lna' };
            // Number followed by a letter = modified base
            if (i + 1 < seq.length && /[A-Za-z]/.test(seq[i + 1])) {
                const base = seq[i + 1].toUpperCase();
                tokens.push({ base, type: typeMap[code] || 'mod' + code, display: base, modCode: code });
                i += 2; continue;
            }
            // Standalone number — render as modification token
            tokens.push({ base: ch, type: typeMap[code] || 'mod' + code, display: ch, modCode: code });
            i++; continue;
        }
        if (/[A-Za-z]/.test(ch)) {
            tokens.push({ base: ch.toUpperCase(), type: basis, display: ch.toUpperCase() });
        }
        i++;
    }
    return tokens;
}

// Fixed color map for internal modification numbers — consistent across sequence and legend
const INT_MOD_COLOR_MAP = {
    5: '#14b8a6',  // teal
    6: '#7c3aed',  // purple
    7: '#d97706',  // amber
    8: '#dc2626',  // red
};

function renderSequenceHtml(seq, large, polymerType) {
    if (!seq) return '<span style="color:#4b5563;">\u2014</span>';
    // Render raw stored sequence with per-character coloring — no token reinterpretation
    const basisCls = (polymerType || 'DNA').toUpperCase() === 'RNA' ? 'seq-rna' : 'seq-dna';
    let html = '';
    let i = 0;
    while (i < seq.length) {
        const ch = seq[i];
        // Modification prefix pairs: m=2'OMe, f=2'F, l=LNA
        if ((ch === 'm' || ch === 'f' || ch === 'l') && i + 1 < seq.length && /[A-Za-z]/.test(seq[i + 1])) {
            const cls = ch === 'm' ? 'seq-2ome' : ch === 'f' ? 'seq-2f' : 'seq-lna';
            html += `<span class="${cls}">${esc(ch)}${esc(seq[i + 1])}</span>`;
            i += 2;
        } else if (/[0-9]/.test(ch)) {
            // Internal modification number — use fixed color identity
            const code = parseInt(ch, 10);
            const color = INT_MOD_COLOR_MAP[code] || '#9ca3af';
            html += `<span style="color:${color};font-weight:700;">${esc(ch)}</span>`;
            i++;
        } else {
            html += `<span class="${basisCls}">${esc(ch)}</span>`;
            i++;
        }
    }
    return html;
}

function renderCardSequencePreview(seq, maxTokens, polymerType) {
    const tokens = parseSequenceTokens(seq, polymerType);
    const show = tokens.slice(0, maxTokens || 20);
    const cssClass = { 'dna': 'seq-dna', 'rna': 'seq-rna', '2f': 'seq-2f', '2ome': 'seq-2ome', 'lna': 'seq-lna' };
    let html = show.map((t, i) => {
        const cls = cssClass[t.type] || 'seq-dna';
        return `${i > 0 ? ' ' : ''}<span class="${cls}">${esc(t.display)}</span>`;
    }).join('');
    if (tokens.length > show.length) html += ' <span style="color:#4b5563;">\u2026</span>';
    return html;
}

function renderTerminalMod5(mod) {
    if (!mod || mod === '-') return '';
    const upper = mod.toUpperCase();
    if (upper === '6FDM3' || upper === '6-FAM' || upper === 'FAM' || upper === '6FAM') {
        return `<span class="term-mod term-mod-fam">FAM</span>`;
    }
    return `<span class="term-mod-generic">${esc(mod)}</span>`;
}

function renderTerminalMod3(mod) {
    if (!mod || mod === '-') return '';
    const upper = mod.toUpperCase();
    if (upper === 'TQ2' || upper === 'BHQ1' || upper === 'BHQ2' || upper === 'DABCYL') {
        return `<span class="term-mod term-mod-quencher">Q</span>`;
    }
    return `<span class="term-mod-generic">${esc(mod)}</span>`;
}

function modToReadableLabel(raw) {
    // Convert internal modification codes to base-centric readable format
    // e.g. 2FdA → A-2′-Fluoro, 2FdC → C-2′-Fluoro, 2OMeG → G-2′-OMe, +A LNA → A-LNA, +A → A-LNA
    if (!raw) return null;
    const v = raw.trim();
    // 2′-Fluoro patterns: 2FdA, 2FdC, 2FdG, 2FdU, 2FdT etc.
    const fMatch = v.match(/^2F(?:d)?([A-Za-z])$/i);
    if (fMatch) return { base: fMatch[1].toUpperCase(), label: fMatch[1].toUpperCase() + "-2\u2032-Fluoro", cls: 'f2' };
    // 2′-OMe patterns: 2OMeA, 2OMeC, 2OMeG, 2OMeU etc.
    const omeMatch = v.match(/^2O?Me([A-Za-z])$/i);
    if (omeMatch) return { base: omeMatch[1].toUpperCase(), label: omeMatch[1].toUpperCase() + "-2\u2032-OMe", cls: 'ome' };
    // LNA patterns: +A LNA, +C LNA, +A, +C etc.
    const lnaMatch = v.match(/^\+([A-Za-z])(?:\s+LNA)?$/i);
    if (lnaMatch) return { base: lnaMatch[1].toUpperCase(), label: lnaMatch[1].toUpperCase() + "-LNA", cls: 'lna' };
    // Generic fluoro/ome/lna detection for other formats
    if (/fluoro|2.?f/i.test(v)) {
        const bm = v.match(/([A-Za-z])$/);
        const base = bm ? bm[1].toUpperCase() : '';
        return { base, label: (base ? base + "-" : '') + "2\u2032-Fluoro", cls: 'f2' };
    }
    if (/ome|2.?ome/i.test(v)) {
        const bm = v.match(/([A-Za-z])$/);
        const base = bm ? bm[1].toUpperCase() : '';
        return { base, label: (base ? base + "-" : '') + "2\u2032-OMe", cls: 'ome' };
    }
    if (/lna/i.test(v)) {
        const bm = v.match(/([A-Za-z])/);
        const base = bm ? bm[1].toUpperCase() : '';
        return { base, label: (base ? base + "-" : '') + "LNA", cls: 'lna' };
    }
    return null;
}

function renderChemistryLegend(o) {
    const pt = (o.polymer_type || 'DNA').toUpperCase();
    const items = [`<span class="chem-legend-item">Basis: ${pt}</span>`];
    const modSlots = [
        { num: 5, val: o.mod_int_5 },
        { num: 6, val: o.mod_int_6 },
        { num: 7, val: o.mod_int_7 },
        { num: 8, val: o.mod_int_8 },
    ];
    // Check which numbers actually appear in the sequence
    const seq = o.sequence_norm || '';
    const numsInSeq = new Set();
    for (const ch of seq) { if (/[0-9]/.test(ch)) numsInSeq.add(parseInt(ch, 10)); }

    for (const slot of modSlots) {
        if (!slot.val || slot.val === '-' || slot.val.toLowerCase() === 'none') continue;
        if (!numsInSeq.has(slot.num)) continue; // only show if number is present in sequence
        const color = INT_MOD_COLOR_MAP[slot.num] || '#9ca3af';
        const parsed = modToReadableLabel(slot.val);
        const label = parsed ? parsed.label : slot.val;
        items.push(`<span class="chem-legend-item"><span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:${color};color:#fff;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;">${slot.num}</span>${esc(label)}</span>`);
    }
    return `<div class="chem-legend">${items.join('')}</div>`;
}

function detectChemBadges(o) {
    const pt = (o.polymer_type || 'DNA').toUpperCase();
    return pt === 'RNA' ? '<span class="chem-badge chem-badge-rna">RNA</span>' : '<span class="chem-badge chem-badge-dna">DNA</span>';
}

function buildInternalChemSummary(o) {
    const tokens = parseSequenceTokens(o.sequence_norm || '', o.polymer_type);
    const mods = [];
    tokens.forEach((t, i) => {
        if (t.type === '2f')   mods.push({ label: "2\u2032F", pos: i + 1 });
        if (t.type === '2ome') mods.push({ label: "2\u2032OMe", pos: i + 1 });
        if (t.type === 'lna')  mods.push({ label: "LNA", pos: i + 1 });
    });
    if (!mods.length) return '';
    // Group by label
    const groups = {};
    mods.forEach(m => {
        if (!groups[m.label]) groups[m.label] = [];
        groups[m.label].push(m.pos);
    });
    const parts = Object.entries(groups).map(([label, positions]) => {
        if (positions.length > 4) return `${label} (${positions.length} positions)`;
        return `${label} (pos ${positions.join(', ')})`;
    });
    return parts.join(', ');
}

// ═══════════════════════════════════════════════════════════════════════════════
// REGISTRY MODE
// ═══════════════════════════════════════════════════════════════════════════════
function renderRegistryList(lp) {
    lp.innerHTML = `
        <div class="list-panel-header">
            <h2>Registry</h2>
            <div class="search-row">
                <input class="search-input" id="reg-search" placeholder="Search name / sequence\u2026" oninput="regFilter()">
                <select class="filter-select" id="reg-status" onchange="regFilter()">
                    <option value="">All</option>
                    <option value="ACTIVE">Active</option>
                    <option value="DRAFT">Draft</option>
                    <option value="RETIRED">Retired</option>
                </select>
                <select class="filter-select" id="reg-basis" onchange="regFilter()" style="width:70px;">
                    <option value="">Basis</option>
                    <option value="DNA">DNA</option>
                    <option value="RNA">RNA</option>
                </select>
            </div>
        </div>
        <div class="list-scroll" id="reg-list"><div class="empty-list"><div class="spinner"></div></div></div>
    `;
    loadRegistry();
}

async function loadRegistry() {
    try {
        const data = await api('GET', '/api/oligo/oligos');
        // Deduplicate rows by probe_id — backend returns one row per synthesis
        const byProbe = new Map();
        for (const row of (data.oligos || [])) {
            const pid = row.probe_id || row.id;
            if (byProbe.has(pid)) {
                byProbe.get(pid).synthesis_count++;
            } else {
                byProbe.set(pid, { ...row, synthesis_count: 1 });
            }
        }
        S.registryList = [...byProbe.values()];
        regFilter();
    } catch (e) {
        document.getElementById('reg-list').innerHTML = `<div class="empty-list">Error: ${esc(e.message)}</div>`;
    }
}

function regFilter() {
    const q = (document.getElementById('reg-search')?.value || '').toLowerCase();
    const st = document.getElementById('reg-status')?.value || '';
    const basis = document.getElementById('reg-basis')?.value || '';
    let items = S.registryList;
    if (q) items = items.filter(o => {
        const hay = [
            o.display_name || '',
            o.canonical_id || '',
            o.sequence_norm || '',
            o.order_number || '',
            o.oligo_number || '',
            o.supplier || '',
            o.polymer_type || ''
        ].join(' ').toLowerCase();
        return hay.includes(q);
    });
    if (st) items = items.filter(o => o.status === st);
    if (basis) items = items.filter(o => (o.polymer_type || 'DNA') === basis);
    const list = document.getElementById('reg-list');
    if (!list) return;
    if (!items.length) { list.innerHTML = `<div class="empty-list">No oligonucleotides found</div>`; return; }
    list.innerHTML = items.map(o => {
        const probeId = o.probe_id || o.id;
        const badges = detectChemBadges(o);
        const lenNt = o.length_nt || (o.sequence_norm ? parseSequenceTokens(o.sequence_norm, o.polymer_type).length : null);
        const batchCount = o.synthesis_count || 0;
        const libCount = o.library_count || 0;
        const synthNo = o.oligo_number || o.synthesis_oligo_no || '';
        return `
        <div class="oligo-card${probeId === S.selectedOligoId ? ' selected' : ''}" onclick="selectOligo('${probeId}')">
            <div class="oligo-card-line1">
                <span class="oligo-card-name">${esc(o.display_name || '\u2014')}</span>
                ${badges}
                ${synthNo ? `<span class="synth-no-badge">${esc(synthNo)}</span>` : ''}
            </div>
            <div class="oligo-card-length">${lenNt ? lenNt + ' nt' : ''}</div>
            <div class="oligo-card-seq">${esc(o.sequence_norm || '\u2014')}</div>
            <div class="oligo-card-meta">
                ${batchCount ? `<span>\uD83E\uDDEA ${batchCount} batch${batchCount !== 1 ? 'es' : ''}</span>` : ''}
                ${libCount ? `<span>\uD83D\uDCDA ${libCount} librar${libCount !== 1 ? 'ies' : 'y'}</span>` : ''}
            </div>
        </div>`;
    }).join('');
}

function statusColor(s) {
    if (s === 'ACTIVE') return 'green';
    if (s === 'RETIRED') return 'red';
    return 'gray';
}

async function selectOligo(id) {
    S.selectedOligoId = id;
    regFilter(); // re-render list to highlight
    showDetail('Loading\u2026', '', '<div style="padding:20px;"><div class="spinner"></div></div>', null);
    try {
        const data = await api('GET', `/api/oligo/oligos/${id}`);
        const o = data.oligo;
        o.syntheses = data.syntheses || [];
        o.libraries = data.libraries || [];
        o.identity_docs = data.identity_docs || [];
        renderOligoDetail(o);
    } catch (e) {
        showDetail('Error', '', `<div class="alert alert-error">${esc(e.message)}</div>`, null);
    }
}

function renderOligoDetail(o) {
    S.currentOligo = o;
    S.currentOligo.syntheses = (o.syntheses || []).slice().sort((a, b) => {
        const da = a?.synthesis_date ? String(a.synthesis_date) : '';
        const db = b?.synthesis_date ? String(b.synthesis_date) : '';
        if (da !== db) return db.localeCompare(da);
        const oa = a?.oligo_number ? String(a.oligo_number) : '';
        const ob = b?.oligo_number ? String(b.oligo_number) : '';
        if (oa !== ob) return ob.localeCompare(oa, undefined, { numeric: true, sensitivity: 'base' });
        const sa = a?.synthesis_oligo_no ? String(a.synthesis_oligo_no) : '';
        const sb = b?.synthesis_oligo_no ? String(b.synthesis_oligo_no) : '';
        return sb.localeCompare(sa, undefined, { numeric: true, sensitivity: 'base' });
    });
    S.selectedBatchIdx = 0;
    showCanvasDetail(
        _buildCanvasHtml(),
        buildOligoActionsHtml(S.currentOligo)
    );
}

function selectBatch(idx) {
    S.selectedBatchIdx = parseInt(idx, 10);

// ─── Oligo action handlers ────────────────────────────────────────────────────
async function setOligoStatus(id, status) {
    try {
        await api('PATCH', `/api/oligo/oligos/${id}/status`, { status });
        await selectOligo(id);
        loadRegistry();
    } catch (e) {
        showAlert('oligo-actions-alert', 'error', e.message);
    }
}

async function saveOligoEdit(id) {
    try {
        const body = {
            display_name: document.getElementById('edit-name')?.value?.trim(),
            notes: document.getElementById('edit-notes')?.value?.trim(),
            mod5: document.getElementById('edit-mod5')?.value?.trim(),
            mod3: document.getElementById('edit-mod3')?.value?.trim(),
            mod_int_5: document.getElementById('edit-mod-int5')?.value?.trim(),
            mod_int_6: document.getElementById('edit-mod-int6')?.value?.trim(),
            mod_int_7: document.getElementById('edit-mod-int7')?.value?.trim(),
            mod_int_8: document.getElementById('edit-mod-int8')?.value?.trim(),
        };
        await api('PATCH', `/api/oligo/oligos/${id}`, body);
        await selectOligo(id);
        loadRegistry();
    } catch (e) {
        showAlert('oligo-actions-alert', 'error', e.message);
    }
}

async function populateLibSelect() {
    try {
        const data = await api('GET', '/api/oligo/libraries');
        const sel = document.getElementById('lib-add-select');
        if (!sel) return;
        sel.innerHTML = (data.libraries||[]).map(l => `<option value="${l.id}">${esc(l.name)}</option>`).join('');
    } catch (_) {}
}

async function addOligoToLib(oligoId) {
    const libId = document.getElementById('lib-add-select')?.value;
    if (!libId) return;
    try {
        await api('POST', `/api/oligo/libraries/${libId}/members`, { oligo_id: oligoId });
        showAlert('oligo-actions-alert', 'success', 'Added to library.');
        await selectOligo(oligoId);
    } catch (e) {
        showAlert('oligo-actions-alert', 'error', e.message);
    }
}

async function createLibWithOligo(oligoId) {
    const name = document.getElementById('new-lib-name')?.value?.trim();
    if (!name) return;
    try {
        const lib = await api('POST', '/api/oligo/libraries', { name });
        await api('POST', `/api/oligo/libraries/${lib.library.id}/members`, { oligo_id: oligoId });
        showAlert('oligo-actions-alert', 'success', `Library "${name}" created and oligo added.`);
        await selectOligo(oligoId);
    } catch (e) {
        showAlert('oligo-actions-alert', 'error', e.message);
    }
}

async function uploadDoc(oligoId) {
    const input = document.getElementById('doc-file-input');
    const file = input?.files?.[0];
    if (!file) return;
    const status = document.getElementById('doc-upload-status');
    if (status) status.textContent = 'Uploading\u2026';
    try {
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch(`/api/oligo/oligos/${oligoId}/upload-doc`, { method: 'POST', body: fd });
        const d = await r.json().catch(()=>({}));
        if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
        if (status) status.textContent = 'Uploaded successfully.';
        setTimeout(() => selectOligo(oligoId), 800);
    } catch (e) {
        if (status) status.textContent = `Error: ${e.message}`;
    }
}

async function downloadDoc(docId) {
    try {
        const data = await api('GET', `/api/oligo/identity-docs/${docId}/download`);
        if (data.url) window.open(data.url, '_blank');
    } catch (e) {
        alert('Could not get download link: ' + e.message);
    }
}

async function saveSynthEdit(synthId) {

    const src = S.sourceList.find(s => s.id === id);
    if (!src) return;
    loadSourceList();

    const viewHtml = `
        <div class="section">
            <div class="section-title">Import Summary</div>
            <table class="kv-table">
                <tr><td>File</td><td>${esc(src.file_name||'\u2014')}</td></tr>
                <tr><td>Supplier</td><td>${esc(src.supplier||'\u2014')}</td></tr>
                <tr><td>Oligos imported</td><td>${src.oligos_detected||0}</td></tr>
                <tr><td>Orders detected</td><td>${src.orders_detected||'\u2014'}</td></tr>
                <tr><td>Date range</td><td>${fmtDate(src.date_range_start)} \u2013 ${fmtDate(src.date_range_end)}</td></tr>
                <tr><td>Imported by</td><td>${esc(src.imported_by||'\u2014')}</td></tr>

    `;
    showDetail(src.file_name || 'Import', `${src.supplier||''} \u00B7 ${src.oligos_detected||0} oligos`, viewHtml, null);
}

async function handleExcelUpload() {
    const input = document.getElementById('excel-file-input');
    const file = input?.files?.[0];
    if (!file) return;
    const supplier = document.getElementById('src-supplier')?.value || 'biomers';
    const progress = document.getElementById('excel-upload-progress');
    if (progress) progress.innerHTML = `<div class="spinner"></div> Parsing and importing\u2026`;

    try {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('supplier', supplier);
        const r = await fetch('/api/oligo/excel-upload', { method: 'POST', body: fd });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);

        const { probes_inserted=0, probes_reused=0, syntheses_inserted=0, duplicates_detected=0, library_candidates=[], warnings=[] } = d;
        let html = `<div class="alert alert-success">Import complete \u2014 ${probes_inserted} identities new, ${probes_reused} identities reused, ${syntheses_inserted} synthesis batches inserted, ${duplicates_detected} duplicates detected.</div>`;
        if (warnings.length) {
            html += `<div class="alert alert-warn">${warnings.length} warning(s):<ul style="margin-top:6px;padding-left:18px;">${warnings.slice(0,10).map(w=>`<li>${esc(w.message||w)}</li>`).join('')}</ul></div>`;
        }
        if (library_candidates.length) {
            html += `<div class="alert alert-info">Library candidates detected (\u226512 oligos per order):<ul style="margin-top:6px;padding-left:18px;">${library_candidates.map(c=>`<li>${esc(c.order_number)} (${Number(c.count||0)} oligos)</li>`).join('')}</ul><div style="margin-top:8px;">${library_candidates.map(c=>`<button class="btn btn-success btn-sm" onclick="createLibFromOrder('${esc(c.order_number)}','${supplier}')">Create library for ${esc(c.order_number)} (${Number(c.count||0)})</button>`).join(' ')}</div></div>`;
        }
        if (progress) progress.innerHTML = html;
        loadSourceList();
        loadRegistry();
    } catch (e) {
        if (progress) progress.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`;
    }
    input.value = '';
}

async function createLibFromOrder(orderNumber, supplier) {
    try {
        const data = await api('POST', '/api/oligo/libraries/from-order', { order_number: orderNumber, supplier, library_name: `${orderNumber} Library` });
        showAlert('src-upload-alert', 'success', `Library created with ${data.members_added||0} members.`);
    } catch (e) {
        showAlert('src-upload-alert', 'error', e.message);
    }
}

// Drag-and-drop for excel upload zone
document.addEventListener('DOMContentLoaded', () => {
    document.body.addEventListener('dragover', e => {
        const zone = document.getElementById('excel-drop-zone');
        if (zone) { e.preventDefault(); zone.classList.add('drag'); }
    });
    document.body.addEventListener('dragleave', () => {
        const zone = document.getElementById('excel-drop-zone');
        if (zone) zone.classList.remove('drag');
    });
    document.body.addEventListener('drop', e => {
        const zone = document.getElementById('excel-drop-zone');
        if (!zone) return;
        e.preventDefault();
        zone.classList.remove('drag');
        const file = e.dataTransfer?.files?.[0];
        if (file) {
            const input = document.getElementById('excel-file-input');
            if (input) {
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                handleExcelUpload();
            }
        }
    });
});

async function createOligo() {
    const name = document.getElementById('c-name')?.value?.trim();
    const seq = document.getElementById('c-seq')?.value?.trim().replace(/\s+/g,'').toUpperCase();
    if (!name) { showAlert('create-alert', 'error', 'OLIGONAME is required.'); return; }
    if (!seq || seq.length < 4) { showAlert('create-alert', 'error', 'Sequence is required (min 4 nt).'); return; }

    const body = {
        display_name: name,
        sequence: seq,
        mod5: document.getElementById('c-mod5')?.value?.trim() || null,
        mod3: document.getElementById('c-mod3')?.value?.trim() || null,
        mod_int_5: document.getElementById('c-modi5')?.value?.trim() || null,
        mod_int_6: document.getElementById('c-modi6')?.value?.trim() || null,
        mod_int_7: document.getElementById('c-modi7')?.value?.trim() || null,
        mod_int_8: document.getElementById('c-modi8')?.value?.trim() || null,
        notes: document.getElementById('c-notes')?.value?.trim() || null,
    };

    // Synthesis batch
    const supplier = document.getElementById('c-supplier')?.value?.trim();
    const orderNo = document.getElementById('c-order')?.value?.trim();
    if (supplier || orderNo) {
        body.synthesis_batch = {
            supplier,
            order_number: orderNo,
            oligo_number: document.getElementById('c-oligo-no')?.value?.trim() || null,
            synthesis_date: document.getElementById('c-synth-date')?.value || null,
            amount_nmol: document.getElementById('c-amount')?.value ? parseFloat(document.getElementById('c-amount').value) : null,
            mw_value: document.getElementById('c-mw')?.value ? parseFloat(document.getElementById('c-mw').value) : null,
        };
    }

    try {
        const data = await api('POST', '/api/oligo/oligos', body);
        const newId = data.oligo?.id;

        // Attach doc if selected
        const docFile = document.getElementById('c-doc-file')?.files?.[0];
        if (docFile && newId) {
            const fd = new FormData();
            fd.append('file', docFile);
            await fetch(`/api/oligo/oligos/${newId}/upload-doc`, { method: 'POST', body: fd });
        }

        showAlert('create-alert', 'success', 'Oligonucleotide created successfully.');
        // Clear form
        ['c-name','c-seq','c-mod5','c-mod3','c-modi5','c-modi6','c-modi7','c-modi8','c-notes','c-supplier','c-order','c-oligo-no','c-amount','c-mw'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        loadRegistry();

        // Switch to registry and select new oligo
        if (newId) {
            switchMode('registry');
            setTimeout(() => selectOligo(newId), 300);
        }
    } catch (e) {
        showAlert('create-alert', 'error', e.message);
    }
}

async function loadLibraryList() {
    try {
        const data = await api('GET', '/api/oligo/libraries');
        S.libraryList = data.libraries || [];
        libFilter();
    } catch (e) {
        const list = document.getElementById('lib-list');
        if (list) list.innerHTML = `<div class="empty-list">Error loading libraries</div>`;
    }
}

function libFilter() {
    const q = (document.getElementById('lib-search')?.value || '').toLowerCase();
    let items = S.libraryList;
    if (q) items = items.filter(l => (l.name||'').toLowerCase().includes(q));
    const list = document.getElementById('lib-list');
    if (!list) return;
    if (!items.length) { list.innerHTML = `<div class="empty-list">No libraries</div>`; return; }
    list.innerHTML = items.map(l => `
        <div class="list-item${l.id === S.selectedLibraryId ? ' selected' : ''}" onclick="selectLibrary('${l.id}')">
            <div class="list-item-name">${esc(l.name)}</div>
            <div class="list-item-sub">${l.member_count||0} member${l.member_count!==1?'s':''}</div>
            <div class="list-item-meta">
                <span class="tag gray">${fmtDate(l.created_at)}</span>
            </div>
        </div>
    `).join('');
}

async function createLibrary() {
    const name = document.getElementById('new-lib-create-name')?.value?.trim();
    if (!name) return;
    try {
        await api('POST', '/api/oligo/libraries', {
            name,
            description: document.getElementById('new-lib-desc')?.value?.trim() || null
        });
        showAlert('lib-create-alert', 'success', `Library "${name}" created.`);
        document.getElementById('new-lib-create-name').value = '';
        document.getElementById('new-lib-desc').value = '';
        await loadLibraryList();
    } catch (e) {
        showAlert('lib-create-alert', 'error', e.message);
    }
}

async function selectLibrary(id) {
    S.selectedLibraryId = id;
    libFilter();
    showDetail('Loading\u2026', '', '<div style="padding:20px;"><div class="spinner"></div></div>', null);
    try {

        renderLibraryDetail({ ...data.library, members: data.members });
    } catch (e) {
        showDetail('Error', '', `<div class="alert alert-error">${esc(e.message)}</div>`, null);

const LIB_PALETTE = ['#34D399','#22D3EE','#60A5FA','#A78BFA','#F59E0B','#F87171','#10B981','#6366F1'];

function libColor(id) {
    // Deterministic color from library ID — use numeric hash of uuid
    let n = 0;
    const s = String(id || '');
    for (let i = 0; i < s.length; i++) n = (n * 31 + s.charCodeAt(i)) >>> 0;
    return LIB_PALETTE[n % LIB_PALETTE.length];
}

function libBuildMemberRows(members) {
    return members.map((m, i) => {
        const seqPreview = renderCardSequencePreview(m.sequence_norm, 16, m.polymer_type);
        const expanded = i === S.expandedMemberIdx;
        const pt = (m.polymer_type || 'DNA').toUpperCase();
        const lenNt = m.length_nt || parseSequenceTokens(m.sequence_norm || '', pt).length;
        const mod5Html = renderTerminalMod5(m.mod5);
        const mod3Html = renderTerminalMod3(m.mod3);
        const seqFull = renderSequenceHtml(m.sequence_norm, true, pt);
        return `
            <div class="lib-member-row${expanded ? ' expanded' : ''}" id="lib-member-${i}">
                <div class="lib-member-summary" onclick="libToggleMember(${i})">
                    <span class="member-name">${esc(m.display_name||m.canonical_id||'\u2014')}</span>
                    <span class="member-seq-preview">${seqPreview}</span>
                    <span class="member-status"><span class="tag ${statusColor(m.status)}">${m.status||'\u2014'}</span></span>
                </div>
                <div class="lib-member-expand${expanded ? ' open' : ''}">
                    ${expanded ? libBuildMemberDetail(m, i, members.length, pt, lenNt, mod5Html, mod3Html, seqFull) : ''}
                </div>
            </div>`;
    }).join('');
}

function libBuildMemberDetail(m, idx, total, pt, lenNt, mod5Html, mod3Html, seqFull) {
    return `
        <div class="lib-member-detail">
            <div class="seq-card">
                <div class="canvas-seq-wrap" style="padding:12px 8px 8px;">
                    <div class="canvas-seq">${mod5Html}${seqFull}${mod3Html}</div>
                </div>
            </div>
            <div class="lib-member-props">
                <div><span class="prop-label">Basis</span><br><span class="prop-value">${esc(pt)}</span></div>
                <div><span class="prop-label">Length</span><br><span class="prop-value">${lenNt} nt</span></div>
                <div><span class="prop-label">Chemistry</span><br><span class="prop-value">${buildInternalChemSummary(m) || 'Unmodified'}</span></div>
            </div>
            <div class="lib-member-nav">
                <button onclick="event.stopPropagation();libNavMember(${idx - 1})" ${idx === 0 ? 'disabled style="opacity:0.4;cursor:default;"' : ''}>\u2191 previous</button>
                <button onclick="event.stopPropagation();libNavMember(${idx + 1})" ${idx >= total - 1 ? 'disabled style="opacity:0.4;cursor:default;"' : ''}>\u2193 next</button>
                <span style="flex:1;"></span>
                <button onclick="event.stopPropagation();switchMode('registry');setTimeout(()=>selectOligo('${m.oligo_id||m.id}'),200);" style="color:#6ee7b7;">Open full record</button>
            </div>
        </div>`;
}

function libToggleMember(idx) {
    if (S.expandedMemberIdx === idx) {
        S.expandedMemberIdx = -1;
    } else {
        S.expandedMemberIdx = idx;
    }
    libRefreshMemberRows();
}

function libNavMember(idx) {
    if (idx < 0 || idx >= S.currentLibMembers.length) return;
    S.expandedMemberIdx = idx;
    libRefreshMemberRows();
    // Smooth scroll to the expanded row
    setTimeout(() => {
        const el = document.getElementById('lib-member-' + idx);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
}

function libRefreshMemberRows() {
    const container = document.getElementById('lib-members-list');
    if (!container) return;
    container.innerHTML = S.currentLibMembers.length
        ? libBuildMemberRows(S.currentLibMembers)
        : '<p class="text-muted" style="font-size:13px;padding:8px;">No members.</p>';
}

function libOligoSearch() {
    const q = (document.getElementById('lib-oligo-search')?.value || '').toLowerCase();
    if (q.length < 2) { document.getElementById('lib-oligo-results').innerHTML = ''; return; }
    const matches = S.registryList.filter(o => (o.display_name||'').toLowerCase().includes(q) || (o.canonical_id||'').toLowerCase().includes(q)).slice(0, 8);
    document.getElementById('lib-oligo-results').innerHTML = matches.length
        ? matches.map(o => `<div class="list-item" style="border:1px solid #e2e8f0;border-radius:5px;margin-bottom:4px;cursor:pointer;" onclick="addMemberFromSearch('${o.probe_id || o.id}')">
            <div class="list-item-name">${esc(o.display_name||o.canonical_id)}</div>
            <div class="list-item-sub text-mono">${esc((o.sequence_norm||'').substring(0,28))}\u2026</div>
          </div>`).join('')
        : '<p style="font-size:12px;color:#6b7280;">No matches</p>';
}

async function addMemberFromSearch(oligoId) {
    if (!S.selectedLibraryId) return;
    try {
        await api('POST', `/api/oligo/libraries/${S.selectedLibraryId}/members`, { oligo_id: oligoId });
        showAlert('lib-actions-alert', 'success', 'Member added.');
        await selectLibrary(S.selectedLibraryId);
        libFilter();
    } catch (e) {
        showAlert('lib-actions-alert', 'error', e.message);
    }
}

async function removeMember(libId) {
    const oligoId = document.getElementById('lib-remove-select')?.value;
    if (!oligoId) return;
    try {
        await api('DELETE', `/api/oligo/libraries/${libId}/members/${oligoId}`);
        showAlert('lib-actions-alert', 'success', 'Member removed.');
        await selectLibrary(libId);
        libFilter();
    } catch (e) {
        showAlert('lib-actions-alert', 'error', e.message);
    }
}

async function deleteLibrary(libId, name) {
    if (!confirm(`Delete library "${name}"? This cannot be undone.`)) return;
    try {
        await api('DELETE', `/api/oligo/libraries/${libId}`);
        S.selectedLibraryId = null;
        clearDetail();
        await loadLibraryList();
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
// DUPLICATES MODE
// ═══════════════════════════════════════════════════════════════════════════════
function renderDupList(lp) {
    lp.innerHTML = `
        <div class="list-panel-header">
            <h2>Duplicates</h2>
            <p style="font-size:12px;color:#9ca3af;margin-top:4px;">Synthesis batches with the same identity</p>
        </div>
        <div class="list-scroll" id="dup-list"><div class="empty-list"><div class="spinner"></div></div></div>
    `;
    loadDups();
}

async function loadDups() {
    try {
        const data = await api('GET', '/api/oligo/duplicates');
        S.dupList = data.duplicates || [];
        const badge = document.getElementById('dup-badge');
        badge.textContent = S.dupList.length;
        badge.classList.toggle('show', S.dupList.length > 0);
        const list = document.getElementById('dup-list');
        if (!list) return;
        if (!S.dupList.length) {
            list.innerHTML = `<div class="empty-list">No duplicates detected</div>`;
            showDetail('No duplicates', 'All synthesis batches have unique identities', '<div style="padding:20px;"><p style="color:#6b7280;font-size:13px;">No duplicate oligonucleotide identities found across synthesis batches.</p></div>', null);
            return;
        }
        list.innerHTML = S.dupList.map((d, i) => `
            <div class="list-item" onclick="showDupDetail(${i})">
                <div class="list-item-name">${esc(d.display_name || d.canonical_id || 'Unknown')}</div>
                <div class="list-item-sub">${d.batch_count||0} synthesis batches with same identity</div>
                <div class="list-item-meta">
                    <span class="tag amber">Duplicate</span>
                    ${d.suppliers ? `<span class="tag gray">${esc(d.suppliers)}</span>` : ''}
                </div>
            </div>
        `).join('');
        if (S.dupList.length) showDupDetail(0);
    } catch (e) {
        const list = document.getElementById('dup-list');
        if (list) list.innerHTML = `<div class="empty-list">Error loading duplicates</div>`;
    }
}

function showDupDetail(idx) {
    const d = S.dupList[idx];
    if (!d) return;
    const batches = d.batches || [];
    const viewHtml = `
        <div class="section">
            <div class="section-title">Identity</div>
            <table class="kv-table">
                <tr><td>Name</td><td><strong>${esc(d.display_name||'\u2014')}</strong></td></tr>
                <tr><td>Canonical ID</td><td class="text-mono">${esc(d.canonical_id||'\u2014')}</td></tr>
                <tr><td>Sequence</td><td class="text-mono" style="font-size:11px;">${esc((d.sequence_norm||'').substring(0,40))}\u2026</td></tr>
            </table>
        </div>
        <div class="section">
            <div class="section-title">Duplicate Synthesis Batches (${batches.length})</div>
            <table class="data-table">
                <thead><tr><th>Supplier</th><th>Order #</th><th>Oligo #</th><th>Date</th><th>Status</th></tr></thead>
                <tbody>${batches.map(b => `
                    <tr>
                        <td>${esc(b.supplier||'\u2014')}</td>
                        <td class="text-mono">${esc(b.order_number||'\u2014')}</td>
                        <td class="text-mono">${esc(b.oligo_number||'\u2014')}</td>
                        <td>${fmtDate(b.synthesis_date)}</td>
                        <td><span class="tag ${b.excel_status==='ACTIVE'?'green':b.excel_status==='DISCARDED'?'red':'gray'}">${esc(b.excel_status||'\u2014')}</span></td>
                    </tr>
                `).join('')}</tbody>
            </table>
        </div>
        <div class="section">
            <div class="section-title">Resolution</div>
            <div class="alert alert-info">To resolve: keep one batch as ACTIVE and discard the others via the Registry \u2192 select oligo \u2192 Actions \u2192 Edit Synthesis Batch.</div>
        </div>
    `;
    showDetail(d.display_name || d.canonical_id || 'Duplicate', `${batches.length} batches`, viewHtml, null);
}

// ═══════════════════════════════════════════════════════════════════════════════
// CERTIFICATES MODE
// ═══════════════════════════════════════════════════════════════════════════════
function renderCertList(lp) {
    lp.innerHTML = `
        <div class="list-panel-header">
            <h2>Certificates</h2>
            <p style="font-size:12px;color:#9ca3af;margin-top:4px;">Attached PDFs and documents</p>
        </div>
        <div class="list-scroll" id="cert-list"><div class="empty-list"><div class="spinner"></div></div></div>
    `;
    loadCerts();
}

async function loadCerts() {
    try {
        const data = await api('GET', '/api/oligo/certificates');
        S.certList = data.certificates || [];
        const list = document.getElementById('cert-list');
        if (!list) return;
        if (!S.certList.length) {
            list.innerHTML = `<div class="empty-list">No certificates or documents</div>`;
            showDetail('Certificates', 'No documents attached yet', '<div style="padding:20px;"><p style="color:#6b7280;font-size:13px;">Attach PDFs to oligonucleotides via Registry \u2192 select oligo \u2192 Actions \u2192 Attach Document.</p></div>', null);
            return;
        }
        list.innerHTML = S.certList.map((c, i) => `
            <div class="list-item" onclick="showCertDetail(${i})">
                <div class="list-item-name">${esc(c.original_filename || c.file_key || 'Document')}</div>
                <div class="list-item-sub">${esc(c.oligo_name || c.synthesis_label || '\u2014')}</div>
                <div class="list-item-meta">
                    <span class="tag ${c.cert_type==='identity'?'':'green'}">${c.cert_type==='identity'?'Identity doc':'Certificate'}</span>
                    <span class="tag gray">${fmtDate(c.uploaded_at)}</span>
                </div>
            </div>
        `).join('');
        if (S.certList.length) showCertDetail(0);
    } catch (e) {
        const list = document.getElementById('cert-list');
        if (list) list.innerHTML = `<div class="empty-list">Error loading</div>`;
    }
}

function showCertDetail(idx) {
    const c = S.certList[idx];
    if (!c) return;
    const viewHtml = `
        <div class="section">
            <div class="section-title">Document</div>
            <table class="kv-table">
                <tr><td>Filename</td><td>${esc(c.original_filename||'\u2014')}</td></tr>
                <tr><td>Type</td><td>${c.cert_type==='identity'?'Identity document':'Synthesis certificate'}</td></tr>
                <tr><td>Linked to</td><td>${esc(c.oligo_name || c.synthesis_label || '\u2014')}</td></tr>
                <tr><td>Uploaded by</td><td>${esc(c.uploaded_by||'\u2014')}</td></tr>
                <tr><td>Uploaded</td><td>${fmtDate(c.uploaded_at)}</td></tr>
            </table>
            <div class="btn-row" style="margin-top:14px;">
                ${c.cert_type==='identity'
                    ? `<button class="btn btn-primary" onclick="downloadDocById('${c.id}')">Download PDF</button>`
                    : `<button class="btn btn-primary" onclick="downloadCert('${c.synthesis_id}')">Download PDF</button>`
                }
                ${c.oligo_id ? `<button class="btn btn-secondary" onclick="switchMode('registry');setTimeout(()=>selectOligo('${c.oligo_id}'),300);">View Oligonucleotide</button>` : ''}
            </div>
        </div>
    `;
    showDetail(c.original_filename || 'Document', c.oligo_name || '', viewHtml, null);
}

async function downloadCert(synthId) {
    try {
        const data = await api('GET', `/api/oligo/syntheses/${synthId}/certificate`);
        if (data.url) window.open(data.url, '_blank');
    } catch (e) { alert('Error: ' + e.message); }
}

async function downloadDocById(docId) {
    try {
        const data = await api('GET', `/api/oligo/identity-docs/${docId}/download`);
        if (data.url) window.open(data.url, '_blank');
    } catch (e) { alert('Error: ' + e.message); }
}
</script>
</body>
</html>
